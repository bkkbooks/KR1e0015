body:
  text: 春秋集傳辨疑卷十唐陸淳撰昭元年夏秦伯之弟針出奔晉左氏曰其車千乘云云又云享晉侯造舟于河十里舍車自雍及絳歸取酬幣終事八反啖子曰針雖富奢應不能至是傳說之太甚也昭二年晉侯使韓起來聘左氏云為政而來見禮也趙子曰按霸國正卿無有適諸國告為政之理前後為政者多矣何不來乎昭四年大雨雹左氏云申豐謂不藏深山之冰故致雹云云趙子曰五帝已前未有藏冰之時豈長雨雹乎假如申豐因此諷藏冰之理亦與經意不同夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申左氏云夏啓有鈞臺之享云云按朝㑹有常禮豈當各各異儀且楚不僭王禮不應說湯武成康若已僭擬不應說齊桓晉文故知非實也秋七月遂滅賴左氏云賴子面縳銜璧楚子焚櫬啖子曰按經但言滅是死位也經傳不同誤也蓋此事是他年楚子曾伐賴賴降而捨之非此時也舊書不編年故誤耳冬十有二月乙卯叔孫豹卒左氏云豎牛餓殺叔孫豹告杜泄以饑授之以戈令逐豎牛泄拒而不從啖子曰杜泄叔孫之忠臣其主見餓將死而不食豈曰忠乎此乃是杜泄殺叔孫也泄之罪大矣沒後雖以輅葬及帥士哭於見誣何補哉又言仲尼喜昭子之不賞私勞以其殺豎牛也若牛實殺豹則是昭子不同戴天之讐殺之何足賞焉故知言殺叔孫皆因俗說致誤若言昭子不知其殺者則昭子尚不知他人安得知而記之乎昭五年夏莒牟夷以牟婁及防兹來奔三傳云重地故書並非也義已見襄二十一年邾庶其傳戊辰叔弓帥師敗莒師于蚡泉趙子曰公羊有釋濆泉之義前後地名未曾解說何獨釋此且三傳字文不同莫知孰是故不足取昭八年秋搜于紅榖梁曰以葛覆質以為𣙗此大迂又以射而中田不得禽即得禽云云此乃有功不勸非防難之義冬葬陳哀公左氏云袁克葬之趙子曰按國已滅矣克又非大臣何能辦葬死君又何能告諸侯使㑹葬乎榖梁曰閔之也滅國多矣何獨閔此昭九年夏四月陳災公榖皆為火左氏作災趙子曰按前後未有書外火者小事若一一書之固不可勝記且諸侯亦當不告也災是天火事大故書之唯宣榭火以樂器所在以示周之所司無人示譏耳此則不同其例也故當依左氏為災也公榖並云存陳閔其見滅故存之若然則他見滅者何存之乎昭十一年夏仲孫貜㑹邾子盟于祲祥左氏云禮也趙子曰按春秋盟㑹是常何獨於有喪之時而稱得禮是時又無大患邾又小國何能有救患之益而汲汲云禮昭十三年秋蔡侯廬歸于蔡陳侯吳歸于陳公羊曰不與諸侯專封趙子曰此本是列國今改過復其所耳何名專封榖梁曰不與楚滅也今方記興復何關滅事責其滅時乎冬十月葬蔡靈公榖梁曰變之不葬者云云其義見葬例又曰不與楚滅且成諸侯之事趙子曰據蔡既興復以禮改葬魯使往㑹依例書之耳昭十五年有事于武宫籥入叔弓卒去樂卒事榖梁曰言大夫之卒雖當祭禮皆告于君啖子曰宗廟大事大夫卒小事以理言之應待祭畢又禮記稱衛侯曰栁莊者非寡人之臣也社稷之臣也如其卒雖當祭必告據此足明常禮不告昭十九年許世子止弒其君買公羊說樂正子春云云趙子曰經責其輕進藥令父薨耳不責其不解醫也樂正子春加一食加一衣能令親愈即子春之親長不殁乎秋齊高發帥師伐莒左氏曰莒子奔紀鄣又說嫠婦以紡度城之事云云啖子曰此言多從委巷之談不近人理又與經不合故不取昭二十年夏曹公孫㑹自鄸出奔宋榖梁曰自鄸者專乎鄸也言力能專制曹無大夫其曰公孫何也言其以貴取之而不以叛言其貴足以專制而今能不以邑叛所以善之而罪曹伯趙子曰按人臣不以邑叛適常事爾豈有褒貴之理乎自緣命卿故書名義與公子首同己見成二年言自鄸者緣先據以叛今力屈奔與魚石自宋南里奔宋公之弟辰自蕭來奔義正同叛時不書不告耳公羊曰為賢者之後諱也然則賢者之後便得恣其不臣乎此說尤鄙哉秋盜殺衛侯之兄縶啖子曰榖梁言母兄稱兄按左氏公羊以母兄母弟為義榖梁則言不以屬通稱兄弟皆有義也今此又云母兄亦為失矣冬十月宋華亥向寧華定出奔陳左氏曰取太子欒母弟辰公子地為質啖子曰按左氏以母弟稱弟為例見辰之出奔書公弟故以此為據而例不通故但都言公子而已又不知是何公之子也傳又言公與夫人每日適華氏食公子且華亥既殺公子六人又曽劫公則逆已甚趙子曰左氏又云華亥妻每日必先食所質公子而後食按其事亦悖逆甚矣何肯如此恭敬亦不近人情昭二十一年宋華亥向寧華定自陳入于宋南里以畔左氏云華多僚譖華貙將納亡人云云啖子曰其後貙竟殺多僚而納華向此乃本有召亡人之謀何名譖乎故略其譖字明其言有徵也昭二十二年宋華亥向寧華定自宋南里出奔楚趙子曰若但言出奔則似入國故書自南里以明之榖梁曰專也何異義乎六月王室亂趙子曰左氏序事大煩碎故略之公羊曰言不及外亦非也此自直紀事實何關不及乎榖梁說是也昭二十三年晉人執我行人叔孫婼左氏云晉將以婼與邾云云啖子曰既終不與不足記也晉人圍郊公羊曰不與伐天子也趙子曰按此實不伐天子也若實伐周豈為其掩惡哉昭二十四年婼至自晉左氏曰叔孫婼欲殺士彌牟云云啖子曰按叔孫忠賢以身奉國豈肯殺大夫纍國乎昭二十五年上辛大雩季辛又雩公羊曰聚徒以攻季氏啖子曰雩但禮官與女巫而已何足攻季氏乎九月齊侯唁公于野井左氏云孫于齊齊侯將唁公于平隂公先至野井云云將求於人必先下之禮之善物也趙子曰禮讓者君子之常豈謂有求然後行之乎此言不可以訓故略之昭二十八年春公如晉次于乾侯左氏云如晉將如乾侯云云使請逆于晉晉使公復于境而逆之趙子曰豈有為客而請逆於主人乎又豈有令客却至境而後逆之乎皆不近人情昭三十一年黑肱以濫來奔左氏云賤而書名重地也言邾無命大夫也趙子曰按不命之大夫事接於魯悉書鄭宛莒慶邾快之類是也此則何獨於三叛人而重地故書哉又云或求名而不得謂齊豹或欲蓋而名彰謂三叛人若艱難其身以險危大人而有名彰徹攻難之士將奔走之言齊豹求勇烈名而不得也趙子曰據例兩下相殺俱非人君為兩下若非大夫即書盜大夫謂王命及君命之大夫殺者於例既不合書名而被殺者合書事須如此耳左氏若以齊豹是大夫但為求名故書為盜以不與其名者則諸相殺而書其名者皆是與其名乎又據左氏說齊豹乃是怒縶而殺之何得妄有求名之義乎且推之情理凡殺人者皆謂懷怨不勝其怒乃為亂耳又云三叛人欲蓋而名彰言其賤必不書其名夫子矯其心而書爾若如此則三人豫知夫子修春秋賤者不書其名乎為是將地賂魯而屬夫子令不書乎何言欲蓋也皆妄為曲說殊可怪也定元年晉人執宋仲幾于京師前年冬十月城成周左氏云㑹于狄泉此年正月又言合諸侯之大夫于狄泉啖子曰說重也一本用夏正一本用周正以此誤也據前已言魏子南面衛彪傒譏之此又重言與前不異故知必重也九月大雩榖梁言月雩正秋冬大雩皆非正也毛澤未盡人力未竭未可雩言八月九月乃當雩也啖子曰雩者以祈雨也若待毛澤盡人力竭雖雨何救哉蓋傳以日月為例故有此分别又曰古之神人有應上公者通乎隂陽君親帥諸大夫而請焉趙子曰按大雩即山林川澤能興雲雨而皆祈焉不必專於上公也定二年五月壬辰雉門及兩觀災趙子曰此自雉門延及兩觀義理分明據實成文耳公榖乃曰自兩觀始違經妄說殊可怪也定四年五月公及諸侯盟于臯鼬左氏云將長蔡而衛侯使祝他私於萇𢎞言踐土之盟衛先於蔡云云按踐土之盟先書蔡名此傳妄也十一月庚辰吳入郢趙子曰按楚君尋反國國不絶祀故不言滅耳榖梁妄為義說故不取也又云吳不稱子不正其乘人之敗而深為利則凡諸入者悉是乘人敗何不總利之乎故下除此三句定五年夏歸粟于蔡公羊曰諸侯之離至不可得而序言前後至故不得序列也趙子曰若實如此則但不列序何不言諸侯歸粟于蔡若諸侯歸之而云爾則魯自歸之如何為文乎榖梁亦曰諸侯歸之義並乖經故不取於越入吳公羊曰於越者未能以其名通越者能以其名通按經既無但書越處此傳自不要也定六年季孫斯仲孫何忌如晉左氏云季桓子如晉獻鄭俘也陽虎强使孟懿子往報夫人幣晉人兼享之孟孫立於房外謂范獻子曰陽虎不居魯而息肩於晉所不以為中軍司馬者有如先君獻子曰寡君有官將使其人鞅何知焉啖子曰切謂魯之大夫見霸主之卿必不敢以此言要之縱實有之亦非忠言嘉謀又非成敗之由故不取冬城中城榖梁曰三家張張為日久此時陽虎用事三家始衰何言張又言非外民也且入春秋已過二百餘年矣豈無缺壞重城乎築何譏也既非新作何得譏外民哉定七年齊人執衛行人北宫結以侵衛榖梁曰以重北宫結也趙子曰按例執行人皆書何獨重結哉定八年公㑹晉師于瓦左氏云魯於是始尚羔趙子曰按魯周公之後比於諸侯最為有學故夫子云魯一變至於道豈有不知羔貴於鴈乎九月盜竊寶玉大弓趙子曰寶玉大弓無用之物陽虎竊取欲令後代知之以為榮故曰盜豫謂此玉與弓魯本受封之重器若失之必合書於經虎又家臣不合書名故依例書為盜而云懲其求名殊非也本取國重寶將以賂外國以求容耳徐思知其不義之甚故歸之豈有求名之理乎榖梁曰非所取而取之謂之盜凡取邑亦非所取何不盡書盜乎定九年得寶玉大弓左氏凡獲器用曰得得用焉曰獲趙子曰得者對失也器用皆合言得則宋大鼎何不言得乎榖梁曰不地羞也趙子曰按緣未出境而得故但以得為名且書以竊猶不羞書地有何羞乎定十年公㑹齊侯于夾谷左氏云盟載之書云云趙子曰按經不書盟傳何得云盟蓋左氏欲以歸汶陽之田歸功於夫子故繆為此說殊不知要而得之非聖人之正也故自遽辟之已下至齊侯將享公悉不取秋叔孫州仇仲孫何忌帥師圍郈左氏云二子及齊師復圍郈趙子曰按有齊師經不當不書下云侯犯請易於齊齊有司觀郈若齊與魯共圍之如何又自令人觀之乎又侯犯豈能以一邑獨立乎如何請易邑於齊乎故知並繆也宋公之弟辰暨仲他石彄出奔陳左氏云辰請止公子地公不許而出奔云云啖子曰若然則公之於辰未為大惡辰之出奔乃是自絶於兄亦是不弟之類何得書弟乎與鄭段義相反矣又云辰曰吾以國人出君誰與處遂與仲他石彄出奔趙子曰豈有二卿無罪肯隨公子出奔不近人情甚矣定十三年冬晉趙鞅歸于晉公羊曰以地正國也言以晉陽人趙子曰據禮臣無專土藏兵之義今乃欲以私邑之强而正國朝則是末大而本小也是黜君而進臣也豈其然乎言夫子意不爾也且實以拒范中行耳而云正國非也又云興晉陽之甲以逐君側之惡人也無君命故書叛若無君命則是君與范中行同心也君與之同心而輒興兵伐之是逆亂也而言歸以美之是訓人為逆也故公羊之義並乖背經意但以君宥而召之又非叛故書歸耳或問曰若然則奸臣挾君而制之以縱其暴亂忠義之士坐而觀之可乎答曰若爾則是賊臣也君所惡也誅君之所惡是勳臣也胡為其不可哉榖梁曰貴其以地反也趙子曰豈有身歸而地不歸乎此言鄙近矣又云其入無君命其入無君命則是將如何得歸乎假君不拒苟且自來其惡可知也又何得書歸乎定十五年九月丁巳葬我君定公雨不克葬戊午日下昃乃克葬榖梁曰乃急辭也趙子曰按凡稱乃緩辭也不得云急詳經意譏臣子緩慢耳乃者有所阻難有所須待之意非急也哀元年齊侯衛侯伐晉左氏曰師及齊師衛孔圉鮮虞人伐晉取棘蒲啖子曰按經不言魯師同伐故不取哀二年晉趙鞅帥師納衛世子蒯瞶于戚公榖皆云輒之拒父古人已知其非不復更辨榖梁序論已詳矣哀七年公伐邾八月己酉入邾以邾子益來榖梁曰以者不以者也益之名惡之也趙子曰例先發既無别理故不要重申之又云其來者外魯之辭豫謂來者至內之辭也何外之有如紀伯姬來豈是外魯乎哀八年宋公入曹以曹伯陽歸左氏云執曹伯陽及司城彊以歸殺之舊注云不書殺不告也趙子曰豫論從告之義已見隱十一年若實殺不書故宜略之吳伐我左氏云為城下之盟而還趙子曰若實為城下盟則魯懼至甚何得不便歸邾子而待齊重請與吳共伐乃歸之乎自矛盾矣經不書盟故不取也哀十二年夏五月公㑹吳于橐臯秋公㑹衛侯宋皇瑗于鄖左氏云衛侯㑹吳于鄖公及衛侯宋皇瑗盟卒辭吳盟趙子曰按上文公自㑹于槖臯不言與衛宋同㑹若實同㑹即書之又若四國同㑹如何三國盟而獨辭吳乎吳力猶能藩衛侯三國敢拒之乎故知此傳謬甚矣經文衛不與吳㑹則子木子貢之言並無所施矣哀十三年公㑹晉侯及吳子于黃池左氏云吳子將以公見晉侯啖子曰按此時吳子爭長而不後晉豈肯帥魯侯以見晉乎又言將囚子服景伯以宗祝之言恐之乃捨景伯按吳通中國備知情僞以鬼神誑之豈肯信乎此言近兒戲也趙子曰據左氏有單平公而不書於經者緣吳晉敵禮而㑹如今賔主對舉酒自然單子無坐位故不書且經文有及字是兩伯之義分明也公羊乃云吳為㑹主與經不同不足取也故留其兩伯之詞而已為敵禮而㑹故晉史即云晉為先㰱而外傳吳語中即云吳先㰱各自護其主而了然可見公羊又曰吳在是則天下諸侯莫敢不至趙云實此㑹為黃池魯地故魯獨㑹之耳若更有諸侯不當不序先儒或云不列序者乃以㑹雨霸為義豫謂若欲如此即云公㑹某侯伯㑹晉侯及吳子于黃池豈不成兩霸之義哉榖梁曰黃池之㑹吳子進矣言進之故稱子趙子曰按此為吳同為㑹主故不人傳不達此理遂妄為義耳哀十四年西狩獲麟趙子曰公羊云孰獲之採薪者按經文言狩若言採薪則與經違矣榖梁曰引取之非狩人獲故曰引取按公榖並以經不言狩人之名故有採薪引取之說不知舉獸獲之義是以爾也榖梁又云不言來不外麟於中國也此據鴝鵒來巢言之按鴝鵒據巢書來麟但以獲書之皆實其事而言耳何煩妄說又云不言有不使麟不恆於中國此據有蜮之類言之耳書有麟西狩獲麟則似麟無數理不要書有何煩妄說若言書有即是不使恆有有年豈不恆有春秋集傳辨疑卷十
