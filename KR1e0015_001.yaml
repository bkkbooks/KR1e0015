body:
  text: 春秋集傳辨疑卷一唐陸淳撰隱元年春王正月公羊曰春者何歲之始也按春為歲首不應煩釋又曰曷為先言王而後言正月王正月也趙子曰若言春正月王則不成文理矣何用解乎又曰不言即位成公意也趙子曰此乃直明公夲意又是事實何名成哉又曰桓幼而貴隱長而卑趙子曰諸侯無二嫡桓何得為貴若然是理可得而越分可得而踰也又曰子以母貴母以子貴趙子曰按妾母不得為夫人若得以子貴即成風之賵葬不應有譏而公羊經外妄生此文遂令漢朝引以為證首亂大法漢哀帝云春秋之義母以子貴遂尊定陶傅太后及丁姬並為帝太后良可惜哉榖梁曰不言即位成公志也去成字之義趙子説同公羊又曰隱不正而成之以惡桓也啖子曰春秋但以其攝不言即位亦無成隱之辭左氏曰生桓公而惠公薨趙子曰蓋言生桓公之後他年惠公薨也若惠公實以生桓公之年薨即隱公被弒之年桓年始十一不應夫子深加以弒君之罪杜元凱亦云然故傳文不要惠公薨恐誤後學也公及邾儀父盟於昧左氏曰邾子克也曰儀父貴之也公榖並同趙子曰蓋見莊十六年邾子克卒以為同盟故書遂以儀父是字耳殊不知儀父亦名也與魯季孫行父及晉荀林父等亦以父為名也緣其未得王命止是附庸之君故卒時不書至莊十六年邾子克卒者即其嗣君自以王命為子故書卒耳且附庸之君非有勤王之善縱能自通於大國自利之事耳有何嘉而字以褒之乎若儀父實賢桓十五年與牟人葛人來朝一例稱人何哉理又可見也八年榖梁傳曰誥誓不及五帝盟詛不及三王交質子不及二伯趙子曰按五帝時用兵極多那得無誥誓之辭但緣夫子敘書首自堯典故以前誥誓之辭不見耳所云盟詛不及三王交質子不及二伯即是也故裁取之凡起例宜於事首故移附於此他倣此鄭伯克段于鄢左氏曰如二君故曰克趙子曰克者能勝之名無有二君之義春秋無有二君相勝稱克者又曰不言出奔難之也啖子曰此乃夫子譏其志在於殺故不言奔若言奔則鄭伯但有逐弟之惡而無殺弟之罪又不知段之有拒兄之逆也又曰遂置薑氏于城潁而誓之曰不及黃泉無相見也啖子曰按莊公云薑氏欲之焉避害又曰不義不昵厚將崩此皆避惡名矣但以不知大義乃陷于殺弟豈子囚母乎此傳近誣矣公羊曰克者殺之也趙子曰按五經春秋前後例未有以克為殺者又曰不稱弟當國也不稱弟者見其不弟也左氏之義當矣又曰其地何當國也按解地之義榖梁當矣榖梁曰克者何能殺也趙子曰其釋克字雖不當義已見上然其傳意得骨肉情意之中故除其殺字之義存其餘也榖梁又曰不稱公子段失子弟之道趙子曰春秋舉重不稱弟為重矣不可更求公子之義且又非命卿例不書公子非獨段也趙子曰鄢當作塢鄭地也在緱氏縣西南至十一年乃屬周左氏曰王取塢劉蒍邘之田于鄭是也傳寫誤為鄢字杜注云今潁川鄢陵誤甚矣按從京至塢非逺又是鄭地段所以有兵衆故曰克若逺走至鄢陵已出境即無復兵衆何得云克又傳曰自鄢出奔共即自塢過河向共城為便路若已南行至鄢陵即不當奔共也天王使宰咺來歸惠公仲子之賵左氏曰緩也且子氏未薨故名云云豫凶事非禮也啖子曰夫諸侯母在天子寧有歸其賵乎不辨菽麥者猶不當爾况平王賢君乎蓋見桓公母仲子未薨誤為此説不知此是惠公之母也因此又説豫凶事等義皆非也公羊曰惠公者隱公之考仲子者桓公之母啖子曰若言惠公仲子是二人則僖公成風亦是二人若是二人則成風是僖公之母而春秋之文以子先母乎故榖梁之説是又曰宰官咺名也趙子曰此止是名氏耳如宰豫之類王士來魯例書名氏石尚是也又曰宰士也士是賤官何以得世官為氏榖梁曰禮賵人之母則可賵人之妾則不可君子以其可辭受之解所以言惠公仲子趙子曰按春秋凡此例常事皆不書若王當賵諸侯妾母則是常事何須書之且以此事為得禮又何以正陵僭乎經文緣是惠公之母故賵之自然須言惠公仲子而遂云以其可辭受之乃是夫子回非禮以為合禮可乎哉及宋人盟于宿公羊曰孰及之內之微者榖梁云及者內卑宋人外卑者趙子曰修二國之好而為盟誓非君則卿何得使微者先儒注云微者不命之卿也按例外之不命卿來魯皆書名但不言氏耳且前後盟而不言內盟者凡七推尋事迹皆是公自盟義見纂例盟篇義例昭然不可或稱是公或稱是微人宿盟云是微幽盟云是公皆舛駁也冬十二月祭伯來公羊曰何以不稱使奔也曷為不言奔王者無外故不言奔啖子曰按例周大夫但不言出而無不言奔之義榖梁曰寰內諸侯也啖子曰按例寰內例稱子若以伯為爵則毛伯召伯榮叔祭叔復是何爵乎是知天子大夫例書字隱二年無駭帥師入極公榖皆云無駭不書氏貶也極同姓之國諱滅同姓之國故書入而貶無駭趙子曰按非王命之大夫例不書氏八年無駭卒榖梁云隱不爵大夫故不氏則名自緣非王命大夫故不書氏何關滅同姓哉又若實滅同姓則當直書滅極以示譏不當言入若滅而言入實入者將如何書之紀履緰來逆女公羊曰何以不稱使婚禮不稱主人趙子曰所以不稱使者為下有伯姬歸于紀文相連間無異事省文從可知公羊不達此意遂妄為説假令婚禮不稱主人但致命之辭不稱爾遣卿出境非君孰使哉又曰母命之何不稱母母不通注云婦人命不通於鄰國但得命大夫行爾若婦人命不通於外而得命大夫令行則紀侯但不自致婚命且何傷命大夫使行也進退自相違背且母命既不通於外又不得稱主人則大夫至彼如何致命乎益知無理也又云宋公使公孫夀無母也皆為穿鑿公孫夀來納幣若不言宋公使則似乎此自為己事故須言宋公以别之爾且禮篇國君娶夫人之辭曰請君之玉女共事宗廟祭統云云如此則稱主人何得妄為異説乎又桓八年祭公逆王后亦言不稱主人亦非也彼自為非王命耳故不言王使説見本傳榖梁曰國氏者為其來接於我故進之趙子曰按非命卿來魯例皆國氏何獨進履緰哉伯姬歸于紀榖梁曰婦人不專行此如專行之辭何也逆之道微無足道焉耳趙子曰據桓公逆夫人於歡下云夫人薑氏至自齊亦以專行為辭則此例不成矣紀子伯莒子盟于密左氏曰魯故也啖子曰傳以子伯為子帛言是履緰之字故附會為此説耳傳意以紀既與魯婚故使大夫為魯結盟通好也榖梁曰紀子伯莒子而與之盟啖子曰此闕文耳云伯之穿鑿甚矣十有二月乙卯夫人子氏薨公羊曰夫人子氏者何隱之母榖梁曰夫人者隱之妻也啖子曰隱公身既謙讓不當君禮母妻卒安肯用夫人禮乎三年君氏卒左氏曰君氏卒聲子也不書姓為公故曰君氏啖子曰按例無有改字以為義者豈有改其本姓乎假如此時隱公之母實卒不行夫人禮亦當如定十五年姒氏卒書姓也公羊曰天王崩諸侯之主也言諸侯大夫赴弔者尹氏主之榖梁曰外大夫不卒此何以卒於天王崩為魯主故隱而卒之趙子曰春秋一字之義為經邦大訓豈有緣其為諸侯及魯大夫作主人之恩遂録之於經乎公羊唯説譏世卿之義是宋公和卒左氏曰宋宣公可謂知人矣立穆公其子饗之命以義夫啖子曰若宣公本知穆公反讓其子且讓以求名乃是許也何足美乎四年莒人伐杞取牟婁公羊曰外取邑不書此何以書疾始取邑也啖子曰按前後例外取邑書者多矣唯取魯邑乃有不書者趙氏辨此義見纂例取篇榖梁曰言伐言取所惡也按有不伐而取邑者各書實事爾無他義翬帥師會宋公陳侯蔡人衛人伐鄭左氏曰宋公使來乞師公辭之羽父固請以行書曰翬帥師疾之也言故去其氏以貶之趙子曰春秋之初公室猶強若公實不許臣何敢固請而行蓋左氏不知未命不書族之義造此事端爾榖梁曰翬不稱公子以其與弒隱公貶之也啖子曰凡事各於本事褒貶豈有未弒君而先貶乎翬之不稱公子自為未命爾後有此義皆同此説衛人立晉榖梁曰晉之名惡也按晉是其名有何惡乎五年考仲子之宫初獻六羽公羊曰僭諸侯猶可言也僭天子不可言也趙子曰按魯僭用八佾非一朝若不因改革之時言之則無以明改自隱公始也事須因此減數時書之公羊不達此意云僭天子則不可言如此則僭差之過無由而著懲勸之道安所寄乎又曰隱為桓祭其母成公意也趙子曰此直公意何成之有榖梁曰仲子者惠公之母隱孫而修之非隱也啖子曰按此時桓公之母喪始終正是考宫之時故知公羊説是又曰考成也成之為夫人也趙子曰考者成室之名耳詩有考室之義是也邾人鄭人伐宋左氏曰宋人使來告命公將救之使者曰師未及國公怒乃止啖子曰夫宋人乞救必當卑辭豈肯令魯怒乎又七年傳云為宋伐邾此則於宋無忿明矣又至九年傳曰宋以入郛之役怨公益知前後差錯也六年鄭人來渝平左氏曰更成也趙子曰傳意謂變讐而更和平也若如此止當來行成耳何要言渝也故知公羊榖梁義為長七年叔姬歸于紀榖梁曰不言逆何也逆之道微無足道焉爾按不言逆者皆夫自逆也不書者常事不書也滕侯卒公羊曰何以不名微國也榖梁曰滕侯無名少曰世子長曰君狄道也啖子曰按附庸之君以及外裔皆有名况滕國文王之子孫雖至微弱豈無名乎又後諸侯卒有不書名者薛伯等是豈皆無名乎齊侯使其弟年來聘榖梁曰諸侯之尊弟兄不得以屬通其弟云者以其來接於我舉其貴者也趙子曰按禮云五十命為大夫天下無生而貴者若以為貴非正王綱之義公伐邾左氏曰為宋討也趙子曰邾伐宋在五年不應二年方為之報左氏此例甚多既非褒貶之意故不取他放此戎伐凡伯于楚丘以歸公羊曰其言伐大之也啖子曰不言執者尊天子之使故云伐也若言不與戎之執王使其書外裔侵伐滅入者豈皆是之乎又曰其地大之也其事實在楚丘若不書地如何紀事乎榖梁曰戎者衛也為其伐天子之使故貶而戎之啖子曰若衛實伐天子之使改之曰戎是為衛掩惡也如何懲勸乎八年鄭伯使宛來歸邴左氏曰鄭伯請釋泰山之祀而祀周公啖子曰鄭人請祀周公已不近人情矣泰山非鄭封內本不當祀又何釋乎公羊曰泰山之下諸侯有湯沐邑焉啖子曰列國至衆若言皆有邑泰山之下何能容之故去其皆字榖梁曰名宛所以貶鄭伯惡易地也按不命之卿來魯例名之不可妄為異説我入邴公羊曰言我者非獨我也齊亦欲之書我者言魯入爾何關齊事乎宋公齊侯衛侯盟于瓦屋左氏曰以釋東門之怨禮也趙子曰諸侯結盟本非正道義見隱元年傳有何合禮故但取其釋怨之辭而去其禮字他皆放此葬蔡宣公公羊曰卒何以名至葬從主人趙子曰卒名之著易代且降於天子也天王崩不書名諸侯生既不名故死乃名之且紀世之次也葬時舉諡而不須重言名史體自當然不要立義公及莒人盟于包來左氏曰以成紀好趙子曰豈有二年之好左氏據二年紀子帛莒子盟于密故也經今六載始成之左氏多此類皆不取他放此九年三月癸酉大雨震電庚辰大雨雪左氏曰凡雨自三日以往為霖平地尺為大雪趙子曰春秋記異不書常事尺雪常事何足記乎豈有二百四十二年唯兩度尺雪哉經唯兩度書大雪益知其妄也文先書大雨震電又復有雪明其異耳非為雨生例妄發霖例又與經違皆不取公會齊侯于防左氏曰宋公不王不朝王鄭伯以王命討之來告伐宋公會齊侯于防謀伐宋也趙子曰按此時王室已至微弱豈諸侯稟命為之討罪乎且隱公賢君即位已來不曽朝聘于王平王之崩不賻又不會葬則魯自當受討何得責人明知當時皆蔑棄周室非獨魯也左氏説事多不實或是魯雜史為飾辭故左氏因之耳其理至明不足為疑若實奉王命討不庭明年伐宋必異其辭不應依常例書伐十年公會齊侯鄭伯于中丘左氏曰盟于鄧按此文與經不合故不取六月壬戌公敗宋師于菅辛未取郜辛巳取防左氏曰庚午鄭師入郜辛未歸于我庚辰鄭師入防辛已歸于我君子謂鄭莊公於是乎可謂正矣以王命討不庭不貪其土以勞王爵正之體也趙子曰諸侯專取他國之邑而以與人罪之大者而云合正何其妄乎以王命討難義己見上文公羊曰外大惡書小惡不書內大惡不書小惡書趙子曰立教之體事無巨細皆記可否以為後世之規豈得簡其大小乎據例小惡皆諱不書敗是也長勺之戰為納讐人之子故書敗是大惡不諱也又云取邑不日此何以日一月再取甚之也趙子曰按此緣與敗不同日又取二邑亦不同日故各書之以記實何得曲為義説凡取皆罪也何論一月再取乎若其異月而取則無罪乎榖梁曰不正乘人之敗而深為利故謹而日之趙子曰安有彼不敗而能取其邑乎假如兵不敗我直取得其邑則無罪乎宋人蔡人衛人伐戴鄭伯伐取之左氏曰蔡人衛人郕人不會王命不同伐宋鄭師在郊伐宋回師宋人衛人入鄭乘虛襲鄭蔡人從之伐戴八月壬戌鄭伯圍戴克之取三師焉三國兵在戴城鄭伯都圍取之宋衛既入鄭以伐戴召蔡人故不和而敗九月戊寅鄭伯入宋報入鄭也趙子曰按三國並大於鄭鄭之兵力可知何能悉取乎假令三國入戴城鄭總取得之則合言圍取之若不圍無由總取得三國在城外則合云伐敗之不得云取詳據經文鄭因三國伐戴之後戴已病矣乘其病而遂伐取之至九月鄭又伐宋明年又言鄭以虢師伐宋報其入鄭若此時已取三師其報怨雪耻斯過當矣何得重重更報益見其紕繆也榖梁曰不正其因人之力而易取之故主其事也趙子曰假如自取豈為正乎何乃須言因人之力始言不正按經文實是鄭取不得云主其事也齊人鄭人入郕左氏曰討違王命也趙子曰若然經必異其文且齊桓已前諸侯未有勤王之事十一年滕侯薛侯來朝左氏曰滕薛爭長云云公請於薛侯曰周之宗盟異姓為後寡人若朝于薛不敢與諸任齒薛任姓也齒列也啖子曰周之典禮自有常度同姓異姓諸侯之班當有常禮也若朝魯則先姬朝薛則先任是亂常禮也故不取其不敢與任齒公及齊侯鄭伯入許左氏曰鄭伯將伐許公孫閼與潁考叔爭車至于君登矣此皆煩碎不足為訓故略之他放此又曰鄭莊公使許大夫奉許叔居許東偏又使公孫獲佐之戒獲云我死乃速去之云云君子謂鄭莊公於是知禮禮經國家定社稷序人民利後嗣也許無刑而伐之服而舍之度德而庭之量力而行之相時而動無纍後人趙子曰諸侯無王命入人之國罪已大矣又使大夫守之不容誅矣而以為有禮是長亂階也公薨左氏曰不書葬不成喪也啖子曰豈有國君之喪而有不成者乎故知公榖以賊不討故不書葬此義為當春秋集傳辨疑卷一
