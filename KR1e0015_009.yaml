body:
  text: 春秋集傳辨疑卷九唐陸淳撰襄元年仲孫蔑會晉欒黶宋華元衛寧殖曹人莒人邾人滕人薛人圍宋彭城左氏云且不登叛人登成也不成其專邑之討謂之宋志成宋志也趙子曰按此乃是夫子裁其邪正不得不如此為文何關不登叛人與成宋志哉公羊曰不與楚專封也趙子曰按此是楚取彭城令魚石守之耳豈名封國乎榖梁曰繫彭城於宋者不與魚石正也趙子曰與叛臣豈疑其為正哉意不應如此夏晉韓厥帥師伐鄭仲孫蔑會齊崔杼曹人邾人把人次于鄫左氏云晉師自鄭以鄫之師侵楚云云啖子曰此説與經不同時魯又會不須告命故知傳妄也襄二年冬仲孫蔑會晉荀罃齊崔杼宋華元衛孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢公羊曰不書取為中國諱也趙子曰按夫子增損經文以示可否覩文見義何諱之為若言鄭虎牢則以譏之也襄三年六月戊寅叔孫豹及諸侯之大夫及陳袁僑盟榖梁曰諸侯已盟又大夫相與私盟是大夫張也啖子曰諸侯盟已畢而袁僑至故大夫與之盟爾無他義襄四年夫人姒氏薨左氏云不殯于廟無襯不虞云云啖子曰若如所言即當不書薨葬此文當在定十五年姒氏卒下誤在此爾但諡曰定姒故知乖誤彼既言不成喪即不必更要此語故遂不取襄五年冬戍陳左氏云冬諸侯戍陳趙子曰按經文無諸侯字奈何妄云諸侯乎公羊云離至不可得而序也縱離至不得列序但云諸侯戍陳於理何傷若諸侯戍之如此為文即魯自戍之而將卑師少如何為文乎又若諸侯盡戍之則兵力盛矣何得下文更為會以救之按僖十三年夏諸侯會于鹹明年城緣陵云諸侯此無諸侯字魯自戍之耳義亦昭然襄六年秋莒人滅鄫公羊此年無傳五年傳云莒女有為鄫夫人者蓋欲立其出出謂鄫之甥莒之子也榖梁曰家有既亡云云由别之而不别也非其立異姓以蒞祭祀云云趙子曰此蓋昭四年經云取鄫以為若今實滅之不合如此所以云立異姓也按莒今滅鄫以為附庸後魯取得之何妨書取鄫乎且定六年鄭滅許哀元年許復見於經則鄫之滅而再見亦何足怪若鄫人實取外孫為國嗣罪自在鄫非莒之過則經文又當如梁亡之類而言鄫亡不得書滅且以人情物理言之鄫雖小國亦有君臣社稷豈肯居然取於異姓為後乎案其事情莒人以兵破鄫立其子使守之而為附庸其子又鄫之外甥令奉鄫祀神不歆非類是使鄫絶祀又事須書滅耳公榖但傳得立鄫甥守祀故書曰滅而不究事實遂誤為傳耳今故裁取使與經合冬季孫宿如晉左氏云晉人以鄫之故來討趙子曰據前年會于戚已令鄫聼命于會即明不私屬魯今鄫亡自不關魯事何得來討據事情季孫執政大夫初嗣位而往見霸主耳襄七年季孫宿如衛左氏曰報子叔之聘聘在元年趙子曰豈有鄰國經七年始報乎但其間聘者已多非卿故不書耳左氏不達此説諸稱尋某之盟報某之聘多此類也冬鄭伯髠頑如會未見諸侯丙戌卒于鄵趙子曰凡諸侯死例書名此則為上文已言鄭伯如會下不可又言鄭伯髠頑卒又不可上言鄭伯如會下但言髠頑卒所以須於如會時便書名以便其文耳三傳不達此體但見其文特異不能釋得遂妄云被弒若實見弒而以疾赴則從而書之諸國弒君豈有實告乎按經文未見諸侯則是已出境臨欲相見爾公羊乃云未出境益見其非也榖梁曰為其欲從中國心與大夫違故見殺如此則夫子何為生名以譏乎益知自相矛盾俱不足取二十五年吳子遏卒同此襄八年公如晉左氏曰朝且聼朝聘之數趙子曰按會邢丘亦言聼朝聘之數若朝以受命何須更會左氏朝聘之下一切須言事由多非其實故多略之夏季孫宿會晉侯鄭伯齊人宋人衛人邾人于邢丘左氏云大夫不書尊晉侯也啖子曰尊晉侯則季孫亦不當書但言會而已且魯君與他國大夫會例皆書人何獨尊晉侯乎襄九年冬公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光伐鄭左氏云冬十月諸侯伐鄭云云門于鄟門云云門于師之梁云云門于北門云云下又云諸侯復伐之十二月癸亥門其三門啖子曰蓋誤重説也古史或有用周正者或有用夏正者故有兩月不同蓋作傳者承二國之舊史月數不同遂兩載之十有二月己亥同盟于戲左氏云鄭服也因載晉鄭盟辭云云啖子曰傳誤云鄭服也若是鄭人與盟何不書及鄭同盟乎又左氏所載之辭乃是晉鄭二國相要何關諸國之事故知傳所載者自是晉鄭盟也經書同盟自是晉與諸國同盟鄭不與也傳以舊史不載同盟之辭遂誤以二國盟辭當之襄十年夏五月甲午遂滅逼陽左氏云晉以逼陽子歸獻于武宫謂之夷俘啖子云按經但書滅逼陽而傳言以歸違經也蓋舊晉史言獻逼陽夷俘于武宫謂獻所獲逼陽人也傳因誤以為逼陽子爾冬戍鄭虎牢左氏云諸侯戍之趙子云魯自戍耳義同五年戍陳襄十一年春王正月作三軍公羊曰三卿也古者上卿下卿上士下士趙子曰按魯卿素已有四五不止三也公羊此説既不可通了適足令學者疑謬爾故不取榖梁曰諸侯一軍趙子曰按國有小大軍制當異而但云一軍無等差之異必無此理周禮萬二千五百人為軍天子六軍大國三軍次國二軍小國一軍據魯初封時最為大國非一軍明矣夏公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于亳城北左氏云鄭人行成啖子曰若曰行成何不盟乎又下言諸侯道弊而無成益知未服其秋又伐鄭鄭行成晉人則赦鄭囚納斥候以禮鄭若言此時亦行成則何不禮之乎傳以同盟則鄭亦與盟為義故致此誤且同盟言十二國若鄭與盟則十三國也楚子鄭伯伐宋左氏云楚子囊乞旅于秦秦右大夫詹帥師從楚子將以伐鄭鄭伯逆之丙子伐宋啖子曰按經文勢鄭原屬楚未屬晉自與楚子伐宋耳傳以上言鄭及晉平故妄言將以伐鄭四字今略之冬公如晉左氏云且拜士魴之辱禮也趙子曰按大國使聘即須自往拜之是公無寧歲也而言禮也一何繆乎此自别事故須往耳襄十三年公至自晉左氏云孟獻子書勞於廟禮也趙子曰按從朝還非有軍戎險難之事何書勞之有襄十四年春季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人會吳于向夏四月叔孫豹會晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人伐秦左氏曰卿不書惰也書於伐秦攝也趙子曰傳意惰為不成事攝為其事攝舉按經意紀盟會用兵以事之邪正為褒貶不為其小小幹舉惰怠生文襄十五年春宋公使向戌來聘左氏云戌見孟獻子謂之曰子有令聞而美其室其若之何獻子曰我在晉吾兄為之啖子曰獻子賢大夫不應歸過於兄劉夏逆王后于齊趙子曰左氏云官師從單靖公逆王后于齊若有單公經不應不書故知妄公榖皆曰過我亦非也豈有天子取后將為天下母而得云外逆女不書故知為劉夏逆之非禮乃書以示譏使卿逆即常事不書耳推此而言知當使卿逆也所謂外逆女不書者謂諸侯於外國娶雖非禮亦不書襄十六年三月公會晉侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于溴梁戊寅大夫盟左氏曰晉平公即位云云與諸侯宴于溫使諸侯大夫舞曰歌詩必類趙子曰按平公父卒此會才五月豈有便行宴樂歌舞之理乎又云使大夫盟高厚高厚逃歸按若已在會乃渝盟而逃歸經文不合不書僖五年會首戴鄭伯逃歸不盟襄七年會于鄬陳侯逃歸並書以明其罪何得獨此不書則左氏此傳都不足憑也或曰鄭伯陳侯為是諸侯逃故書高厚大夫耳不應同例答曰春秋未命之大夫奔逃執放並書况正卿而逃得不書乎襄十九年晉士丐帥師侵齊至榖聞齊侯卒乃還榖梁曰君不尸小事臣不專大名善則稱君過則稱已則民作讓矣士丐者宜奈何宜墠帷而歸命于介按不伐喪常禮也更待君命是詐讓小善非人臣盡忠之道也齊殺其大夫高厚趙子曰據左氏傳齊高厚莒意恢楚卻宛等死並是兩下相殺而經以國討為文者蓋殺者皆承君命而殺之故經以纍上之文書之傳則因雜史之記意在專歸罪於殺者故不貴其君命耳且當據經文為正也襄二十一年邾庶其以漆閭丘來奔左氏云庶其非卿也以地來雖賤必書重地趙子曰按不命之卿接於魯者悉書名鄭宛莒慶秦術之類是也何用妄為義乎襄二十二年楚殺其大夫公子追舒左氏曰王與子南子棄疾謀殺子南棄疾不告其父子南既死而棄疾亦自殺啖子曰按楚子必當不與其子謀殺其父棄疾猶能自殺必非凶逆之人豈有父將見殺而子不告乎襄二十五年六月壬子鄭公孫舍之帥師入陳左氏曰子産獻捷于晉晉人問其罪云云趙子曰當時陳屬楚鄭能侵而獻功于晉晉人悅之甚矣何得責問罪又云我先君莊公奉五父而立之五父陳他也按五父弒君之賊豈以立弒君賊為功乎又云何故侵小按當時侵伐常事不當有此責問且陳大於鄭何云侵小又云仲尼曰言而無文行之不逺且使務華忘實非聖意也論語曰辭達而已矣何哉故知非實並不取秋楚屈建帥師滅舒鳩左氏説舒鳩叛事云云啖子曰既非經之本傳故不備載但撮其歸要以明舒鳩見滅之由耳十二月吳子遏伐楚門于巢卒趙子曰此與七年鄭伯髠頑如會卒于鄵文義正同皆以便文耳公榖之説非也襄二十六年公會晉人鄭良霄宋人曹人于澶淵左氏云卿不書尊公也云云啖子曰若然良霄何以不尊公乎又衛侯會之亦不與經合皆不取襄二十七年夏叔孫豹會晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋秋七月辛巳豹及諸侯之大夫盟于宋左氏云滕成公邾悼公皆至齊人請邾宋人請滕皆不與盟季孫請視邾滕叔孫曰邾滕人之私也何故視之書曰豹言違命也啖子曰時邾滕雖小常列盟會未肯便為私屬又此後邾滕皆列於會故知不實且豹之不氏自為先目後凡左氏妄以舍族為貶遂穿鑿為説耳又云楚人衷甲云云趙子曰且大會諸侯弭兵為事豈有便行掩襲之道假如事成豈是強霸且子木賢大夫必不爾也又云先楚人書先晉晉有信也按當時晉強於楚又是中國盟主豈有後於楚之理作傳者徒黨於中國以成楚人之惡都非實也且與經違故皆不取左氏又云享于垂隴七子賦詩趙孟論其休咎一一皆驗以人理言之皆虛謬也且伯有若不能誦詩則當無言而止若能之豈有賦如是惡詩左氏委曲誣辭多此類也向戌請賞云云子罕責之云而又求賞無厭之甚削而投之子罕賢大夫假如不欲其無厭亦當微辭曉諭豈有君與之而臣輒削其書而投之乎殊為鄙近必不爾也十二月乙亥朔日有食之左氏云辰在申司厯過也再失閏矣啖子曰按經言十二月傳言十一月又言再失閏依經當為三失閏進退不同不可得而考故不取襄二十九年公在楚左氏曰釋不朝正於廟也云云啖子曰前後正月公不在例不書何獨於此釋不朝正乎又言楚使公親襚公使巫以桃茢先祓殯言以君臨臣喪之禮行之且楚之強僭豈肯使魯辱之又言楚人悔之則非楚不知禮必當見討何得全無事乎蓋魯以親襚為辱故妄為此説以救其耻史臣因妄而記之傳因史而書之禮記又因舊説之妄而妄載之趙子曰公羊云存公也榖梁云閔公也俱非立教之意故並不足取夏公至自楚榖梁曰喜之也趙子曰按君之出入史必書之更記何事而云喜之非也吳子使札來聘公羊曰賢者不名啖子曰夫褒而字之但為有殊異之美者非謂賢者常不名襄三十年五月甲午宋災宋伯姬卒公榖皆曰賢也趙子曰據經文直書實爾未有褒義在卒時書之襄三十一年十一月莒人弒其君密州左氏云展輿因國人以攻莒子弒其父不當不書義同庶其之弒但恐是展輿因國人之攻弒莒子乃立傳誤以之字為以字不敢輒改其文故略其辭春秋集傳辨疑卷九
