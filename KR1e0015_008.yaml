body:
  text: 春秋集傳辨疑卷八唐陸淳撰宣元年春王正月公即位榖梁曰繼故而言即位與聞乎故也啖子曰按宣公本不同謀不可同桓公之說又經文不去王字義亦昭然公子遂如齊逆女左氏云尊君命也傳意稱公子啖子曰義在下三月遂以夫人婦姜至自齊左氏云尊夫人也解不稱公子啖子曰書曰公子公命何以加尊乎不稱公子夫人何以尊乎蓋左氏不知有一事再見者卒名之義故妄為此說晉放其大夫胥甲父于衛公羊曰放之者何猶曰無去是云爾然則何言爾近正也啖子云此傳意為是三年待放之義此乃三諫不從以禮而去者今放名雖同而實殊傳蓋不見事迹故云爾秋宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭公羊曰此晉趙盾之師曷為不言趙盾之師君不㑹大夫之辭也趙子曰按春秋諸侯㑹大夫者非一何於此獨生義乎榖梁曰列數諸侯而㑹晉趙盾大趙盾之事也啖子曰晉師先已書今四國會之自常例爾有何義乎又曰地而後伐鄭疑辭也注云疑故㑹謀也趙子曰凡衆國共行之理春秋舉大綱示邪正豈有為其聚謀與不謀為例又曰此其地何著其美也美稱能謀按春秋未有師書地為褒之例冬晉趙穿帥師侵崇公羊曰柳者何公羊崇作栁天子之邑也曷為不繫于周不與伐天子也啖子曰崇小國也傳既誤為栁故妄說也宣二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元左氏說宋敗之由華元殺羊食士其御羊斟不與啖子曰且軍士猶饗之况其御乎御既寡且親近必無不與故不可從也又言以贖華元于鄭半入華元逃歸且鄭既受贖許歸華元何用逃乎又言華元巡城城者謳云云華元之御答以犀兕尚多棄甲則那棄甲者譏其喪師徒也豈專惜甲胄乎華元賢臣豈肯以多犀兕文其過輕答城者乎皆近誣也故不取又非解經之義也榖梁曰盡其衆以殺其將先言敗績而後言獲知師衆盡力以三軍敵華元華元雖獲不病矣趙子曰按軍敗身獲而云不病此說非也但緣師先敗績身乃見獲依次第書之有何褒貶乎若欲褒貶之乃足見其不身先士卒爾何得云善也晉侯夷吾之見獲為馬陷濘中師實不敗各依事實而言無煩曲說秋九月乙丑晉趙盾弒其君夷臯左氏云仲尼曰惜也越境乃免趙子曰董狐云亡不越境言行未逺而君被殺反又不討賊狀涉同謀爾非謂越境即無罪也作傳者不達此意遂妄附㑹為此言誣何甚若然者則奸臣令人弒君身越境而還即為無罪乎故當辨其情狀之邪正不合論越境與不越境宣三年春王正月郊牛之口傷榖梁曰之口緩辭也趙氏云之助語辭爾何煩妄釋改卜牛牛死乃不郊猶三望左氏曰不郊而望皆非禮也趙子曰據傳不言凡即當年之事謂二事並非禮養牲只養二牛既並死自然合廢郊何得云皆非禮榖梁曰乃者亡乎人之辭此言無理之甚不足難也宣四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向公羊曰其言不肯何辭取向也傳意今魯取向有辭啖子曰聖人設教豈為魯欲取向而妄加莒事乎榖梁曰弗肯者可以肯也按書不肯者明莒非以他事見伐且譏公伐莒取向又曰伐莒義兵也又云伐猶可趙子曰按非王命又非侯伯興兵安得稱義又稱可乎宣五年春公如齊夏公至自齊左氏云公如齊高固使齊侯止公請叔姬焉公至自齊書過也啖子曰就鄰國之君而為大夫求婚不近人理蓋妄也若實然必有異文冬齊高固及子叔姬來公羊曰其諸為其雙雙而俱至者按經文直書其事以見非禮爾何用曲為義乎宣七年冬公㑹晉侯宋公衛侯鄭伯曹伯于黑壤左氏云盟于黑壤王叔桓公臨之至于不書諱之啖子曰經但言㑹傳作盟不與經合矣又說公見止亦近誣故皆不取宣八年六月辛巳有事於大廟仲遂卒于垂壬午猶繹萬入去籥榖梁曰以其為之變譏之也趙子曰若然則都不為變于籥並施則可都不譏乎戊子夫人嬴氏薨公榖並云熊氏又諡為頃熊趙子曰據理頃為惡諡不應公母特加惡諡故從左氏為敬嬴宣九年秋取根牟公羊曰邾婁邑也曷為不繫乎邾婁諱亟也趙子曰不繫乎邾蓋本魯邑也數取不繫有何義乎宣十年春公如齊公至自齊齊人歸我濟西田公羊云齊已取之矣其言我何言我者未絶於我也趙子曰已取之又言未絶何迂誕之甚言我者為濟水長不必盡是魯田以别他爾榖梁曰公娶齊齊繇以為兄弟友之不言來公如齊受之也趙子曰但言歸我則足知其來也省文爾哀八年歸歡及闡豈是公受乎夏齊崔氏出奔衛左氏曰凡諸侯之大夫違告於諸侯曰某氏之守臣某失守宗廟敢告啖子曰此乃其私告辭非國命也秋天王使王季子來聘公羊曰王季子者何天子之大夫也其稱王季子何貴也其貴奈何母弟也啖子曰聖人設教不應於母弟則偏貴之宣十一年冬十月楚人殺陳夏徵舒丁亥楚子入陳納公孫寧儀行父于陳左氏曰書有禮也啖子曰若以納亂臣為有禮孰為非禮榖梁曰入而殺之也其不言入何外徵舒于陳也趙子云按經文皆依先後次第而書爾何煩妄為異說徵舒弒君之賊其罪自顯何須外之凡稱日以隔文者皆以明先後其例甚多宣十二年夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績公羊曰大夫不敵君此其稱名氏以敵楚子何不與晉而與楚子為禮也按此傳得臣與晉侯戰稱人遂穿鑿為此說爾且得臣未命之卿例不書名氏無他義也冬十有二月戊寅楚子滅蕭左氏說蕭見滅之由云蕭人殺熊相宜僚楚人遂滅蕭啖子曰按左氏前後說事迹與此相似者甚多恐是前志寓言以諷諫作傳者承之而録未必得其實故不取宣十五年五月王札子殺召伯毛伯公羊曰王札子者何長庶之號也趙子曰此傳不知字例遂妄穿鑿爾榖梁曰矯王命以殺之啖子曰焉知矯命殺之經無異文不足憑也秋初稅畝榖梁曰非公之去公田而履畝十取一也趙子曰蓋公田之外又履步其田十又稅其一論語云二吾猶不足是也若去公田而别行什一之稅所得與籍何殊故去此一句冬蝝生左氏注云未為災而書之者幸其冬生不為物害喜而書之趙子曰按此類生訖便為災如蠶而食葉也但為秋中之螽未息冬又生子重重為災故書榖梁曰非災亦非也宣十六年成周宣榭火公羊曰宣榭者宣宫之榭也啖子曰按宣王之廟毁已久矣縱失禮不毁止當在城不當在成周也成元年二月無氷榖梁云終時無氷則志此未終時而言無氷何也終無氷矣加之寒之辭也啖子曰二月今之十二月舉此無氷則一時無氷可見矣若待終時乃書則到今時正月矣豈可更言無氷乎秋王師敗績于茅戎公羊曰孰敗之蓋晉敗之或曰貿戎敗之曷為不言晉敗之王者無敵莫敢當也啖子曰若晉敗王師而改曰貿戎是掩惡也如何懲勸乎冬十月榖梁曰季孫行父秃晉郤克眇衛孫良夫跛曹公子手僂同時而聘於齊齊使秃者御秃者使眇者御眇者使跛者御跛者使僂者御僂者蕭同姪子處臺上而笑之聞於客客不悅而去相與立胥閭而語移日不解齊人有知之者曰齊之患必自此始矣啖子云此似街談巷議之說不當載於冊牘故略之成二年季孫行父臧孫許叔孫僑如公子嬰齊帥師㑹晉郤克衛孫良夫曹公子手及齊侯戰于鞍齊師敗績左氏說戰事云云又言齊侯免求逢丑父逢丑父三出三入晉軍云云啖子曰時齊師大敗而晉師全勝若三入晉必當見獲此近妄也公羊曰曹無大夫公子手何以書憂內也由為魯也趙子云春秋之作所以辨邪正明是非也豈獨黨於內哉據稱公子即王命之卿但以國小之故不能自崇樹其大夫請命於王者少唯此與昭二十年公孫㑹凡二人耳其他無事不見於經不得謂之無大夫也榖梁曰以吾四大夫在焉舉其貴也言不欲令內衆大夫與外卑者共行趙子曰此尤鄙近春秋豈黨內而專輕於外乎十有一月公㑹楚公子嬰齊于蜀榖梁曰楚無大夫其曰公子何也嬰齊亢也啖子曰前以處父不書族為亢今以書族為亢何自矛盾也成六年二月辛巳立武宫左氏云季文子以鞍之功立武宫非禮也聼於人以救其難不可以立武立武由己非由人也啖子曰傳意以為武軍之宫如楚子所立者非也宣十二年楚自邲戰曰作先君宫以告成事若然煬宫復何謂乎趙子曰立武宫蓋别緣他故若以鞍戰之故不應經五年方立之成八年春公孫嬰齊如莒左氏曰逆也趙子曰若然則非禮也經當言之今不書故知妄也夏宋公使公孫夀來納幣趙子曰昏禮而使公孫非也左氏曰禮也何其謬歟若合禮則常事不書公羊曰録伯姬亦無禮之甚也秋七月天子使召伯來錫公命公羊曰其稱天子何元年春王正月正也其餘皆通矣榖梁曰禮有受命無來錫命錫命非正也說已見莊元年曰天子何也曰見一稱也啖子曰二傳不知文之誤强穿鑿爾冬衛人來媵公羊曰録伯姬也録其賢也榖梁曰以伯姬不得其所故盡其事也傷其災死故備言之按經文書媵義譏其數爾非謂伯姬也義見媵例成九年把伯來逆叔姬之喪以歸啖子云左氏文十二年傳云把伯來朝始朝公也且請絶叔姬而無絶婚下又言叔姬卒來歸自把故書不言把絶也書曰叔姬言非女也此傳大誤當是舊書有說此事者言把伯請絶婚而編年作傳者見文十二年有杞伯來朝又有子叔姬卒妄置於彼而加請絶叔姬以合其義非也蓋成公六年七年中使使來請無絶婚故復逆叔姬也彼宣公五年子叔姬自是魯女未嫁者與伯姬卒同義若不言叔姬復是何國出乎知今此書者魯已許其逆也夏季孫行父如宋致女公羊曰録伯姬也趙子曰按春秋之義以辨正是非但云録伯姬是何褒貶榖梁曰既嫁于夫譏以我盡之也趙子曰女嫁後遣使往致之親好之意何譏之有又曰詳其事賢伯姬也按春秋褒貶當事而書未有别紀閒事以為褒也冬城中城榖梁曰非外民也趙子曰此說非也若中城實摧壞豈得不修之乎成十年五月公㑹晉侯齊侯宋公衛侯曹伯伐鄭左氏云晉侯有疾五月晉立太子州蒲以為君而㑹諸侯伐鄭啖子云若然失禮之甚經當有貶既無貶文蓋傳妄也成十二年春周公出奔晉公羊曰王者無外此其言出何自其私土而出也按周是畿內之國不當以私土為義榖梁曰周有入無出上下一見之也上謂天王出居按二百四十二年適㑹有此二事爾故見上下也夏公㑹晉侯衛侯于瑣澤左氏云晉令鍾儀歸求成于楚在成九年華元克合晉楚大夫盟于宋國西門之外趙子曰按此若實事則無不告諸侯之理經不應不書也又曰㑹于瑣澤成故也按此㑹楚不與焉何以證其成乎故並繆也蓋舊說有晉令鍾儀歸求成事竟不集左氏遂誤附㑹為此傳耳成十三年公㑹晉侯齊侯宋公衛侯鄭伯曹伯邾人滕人伐秦左氏有吕相絶秦云云啖子曰其辭兩誣故不取曹伯廬卒于師榖梁曰閔之也按此事實何閔之有成十五年三月乙巳仲嬰齊卒公羊曰謂之仲嬰齊為兄後也榖梁曰子由父疏之也啖子曰二傳不知時有叔肸子公孫嬰齊此故稱仲以别之之義故妄說爾晉侯執曹伯歸于京師榖梁曰以晉侯而斥執曹伯惡晉侯也不言之急辭也斷在晉侯矣啖子云此傳不知曹伯有篡弒之罪故妄說耳秋宋華元自晉歸于宋左氏云魚石自止之且請討遂反趙子云按經文云奔晉又云自晉歸于宋傳云魚石自止華元于河上請討許之乃反殊相違矣且魚石自請討蕩澤則是處無過之地矣既討之後何事魚石又奔假如魚石為與蕩氏同族慚而自去則是知耻之人後不應却入彭城為亂考之事理無非乖謬魚石直與蕩澤同惡爾宋魚石出奔楚左氏云華元自止之不可乃反趙子曰按國亂用兵相攻是仇敵也如何自止之乎冬十有一月叔孫僑如㑹晉士燮齊高無咎宋華元衛孫林父鄭公子鰌邾人曹人㑹吳于鍾離公榖皆曰再言㑹外吳趙子曰按實再㑹依實書之何外吳之有徒為煩迂耳成十六年六月甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績公榖皆曰楚子傷故不言師趙子曰若然則宋公傷於泓吳子傷於檇李何得不稱君敗乎假如君雖傷而師則勝又如何為義乎故不稱師師不敗爾九月晉人執季孫行父舍之于苕丘公羊曰執未有言舍之者言舍之者何仁之也曰在招丘悕矣按經書舍之于苕丘言不在晉都執據實書耳無他義成十七年十一月公至自伐鄭壬申公孫嬰齊卒于貍脤趙子曰是月也無壬申書壬申誤也榖梁曰致君而後録臣按春秋編年月之書一例以先後書之且言卿卒後言公至皆據實事何傷教意二傳不達其文謬誤之理遂妄說春秋集傳辨疑卷八
