body:
  text: 春秋集傳辨疑卷三唐陸淳撰莊元年三月夫人孫于齊左氏曰不稱姜氏絶不為親禮也趙子曰若謂荘公為得禮乎此則非荘公之意若謂夫人為得禮乎則哀姜之孫不去姜氏則知此兼惡在齊侯爾公羊曰内諱奔謂之孫趙子曰非也書曰堯將孫于位亦是諱奔乎故謙避曰孫爾臣子之禮辭也又曰夫人固在齊矣其言孫于齊何念母也啖子曰豈有先在齊而今書孫乎葢見無夫人至處故云爾不知夫人隨䘮而歸但不告廟故不書爾榖梁曰接練時錄母之變始人之也按此傳意亦言夫人先在齊至練時始錄之説同公羊夏單伯逆王姬公羊曰何以不稱使天子召而使之也按魯自使逆天子何事召之不言使省文爾榖梁曰不言如何也義不可受於京師也趙子曰言逆王姬則知徃京師矣但云逆女須先書如某以别之省文之義爾無他意築王姬之館于外左氏曰于外禮也趙子曰與讐主婚縱在城外豈為禮乎榖梁曰於廟則已尊於寝則已卑為之築節矣趙子曰廟者非所當居何論尊乎王姬不可居公寝何論卑乎故公羊之説是又曰其不言齊侯之來逆何也不使齊侯得與吾為禮也啖子曰齊侯之來常事不書爾無他義前後無書諸侯自逆者王使榮叔來錫桓公命公羊曰錫者賜也命者加我服也榖梁意亦同趙子曰桓公已塟命何所施之榖梁又曰禮有受命無來錫命錫命非正也趙子曰按錫命如漢已來就加爵秩何得無乎若一一召而錫之則勞弊甚矣况桓公已薨如何受命乎齊師遷紀郱鄑郚公羊曰遷者何取之也曷為不言取為襄公諱也按取人邑非善事若為之諱是掩惡也榖梁曰紀國也郱鄑郚國也或曰遷紀于郱鄑郚啖子曰按下有紀侯大去其國明此時未遷故知郱鄑郚是紀之三邑爾莊二年公子慶父帥師伐於餘丘公榖皆云於餘丘邾之邑也啖子曰按前後未有邑言伐者故依左氏舊説為國夫人姜氏㑹齊侯于郜榖梁曰婦人既嫁不踰境踰境非正也趙子曰縱未嫁豈得踰境乎且婦人送客不出門何論境哉荘三年溺㑹齊師伐衞左氏榖梁皆以不稱氏為貶按例不命之卿則不書氏不可别為義公羊説雖是為己都見名位例故不重釋五月塟桓王左氏曰緩也啖子曰此自改塟不當譏緩傳見桓十五年王崩後未見書塟處故云爾榖梁曰或曰卻尸以求諸侯啖子曰停尸七年以求諸侯非人情也紀季以酅入于齊公羊曰何以不名賢也趙子曰此乃紀侯之命且不得已而然何足為賢哉公次于郎左氏曰凡師一宿為舍再宿為信過信為次趙子曰經無信舍之文不要此例荘四年夫人姜氏享齊侯于祝丘榖梁曰饗齊侯所以病齊侯也啖子曰此乃魯國之耻豈獨病齊侯乎紀侯大去其國公羊曰齊襄公復九世之讐故為之諱滅此義迂僻甚矣不復繁文榖梁曰大去者不遺一人之辭言民之從者四年而後畢也啖子曰若然舉國而行何名去國文義相反矣又曰紀侯賢而齊侯滅之不言滅而曰大去其國者不使小人加乎君子趙子曰凡不絶其祀例不書滅無他義假令紀侯是小人則可滅之乎齊侯塟紀伯姬公榖皆云以其失國故隱而塟之趙子曰春秋舉禮敎以示後豈為一時悲喜生文乎公及齊人狩于郜公榖皆謂齊人是齊侯也趙子曰按春秋未有與諸侯㑹而書彼君為人者若此非齊侯則實與微者狩復書為何哉若實是齊侯即當書云及齊侯狩于郜而不書公此則諱公之義義與盟義同不應諱齊侯也荘五年公㑹齊人宋人陳人蔡人伐衞公羊云不言納朔避王也趙子曰據諸侯之心實不避王而經文反為之隱避是黨罪人也若以為為王諱其逆命則王室亂及尹氏立子朝猶不諱不應諱此若云為魯諱則成宋亂及納子紏皆不諱亦無宜諱此但縁納事已著再書則煩冗故不書爾義見本年榖梁曰是齊侯宋公其曰人何也人諸侯所以人公也其人公何逆天王之命也啖子曰若貶之反書曰人則後人安知其宋公齊侯乎此乃隱其惡爾何名貶哉六年王人子突救衛榖梁曰救者善則伐者不正矣趙子曰假令天子不正諸侯豈得舉兵以爭哉衞侯朔入于衞公羊曰何以名犯命也榖梁曰惡也趙子曰按失地之君例名之不可别為義葢公榖以有王人救衞故於朔之出入並有犯命及得罪於王之説其國君出奔而名者豈得罪於王乎不知事實相承妄説爾齊人來歸衞寳公羊曰是衞人歸之稱齊人者讓於我也言齊人讓功於魯人啖子曰按例無有改其事實而為義者此乃觀文見意何煩曲説榖梁曰以齊首之分惡於齊也按此乃書其事有何分惡乎荘七年姜氏㑹齊侯于防左氏曰齊志也注云至魯地則齊侯之志趙子曰齊人與姜氏通姦久矣罪惡素均豈煩今日乃以其地辨彼此之罪乎夜中星隕如雨左氏曰與雨偕也言與雨俱落公羊曰雨星不及地尺而復榖梁曰不曰恒星之隕何也我知恒星之不見不見其隕也啖子曰星隕如雨為奔流者衆如雨之多自漢己來史籍頻有詩曰有女如雲李陵曰謀臣如雨皆言多爾三傳不達此理故悉穿鑿榖梁又曰著於上見於下謂之雨趙子曰若其不多豈得稱雨哉又曰著於下不見於上謂之隕趙子曰隕落也無煩曲説秋大水無麥苗公羊曰曷為先言無麥而後言無苗一災不書待無麥然後書無苗啖子曰按例一災皆書八年師次于郎以俟陳人蔡人公羊曰次不言俟言俟託不得已也趙子曰此直書事實有何託乎甲午治兵左氏曰治兵于廟禮也趙子曰予以為兵車之衆非廟中所容且榖梁又説出入之義明知在城外為場爾夏師及齊師圍郕郕降于齊師公羊曰郕者何盛也盛則曷為謂之郕諱滅宗姓也啖子曰按實降于齊爾如何諱滅乎迂僻甚矣秋師還左氏曰君子是以善魯荘公言其克己復禮不伐齊師趙子曰勞師㑹讐何善之有且齊强魯弱自當不敢爭也詳據經文當緣告廟故書爾齊無知弑其君諸兒榖梁曰大夫弑其君以國氏者嫌也弑而代之也按例不命之卿例不書氏既不書氏自然以名連國强説嫌理迂僻之甚荘九年公及齊大夫盟于蔇左氏公榖並云及大夫盟齊無君也趙子曰若但如此説有何勸戒之意哉必實然據例不合書公義見隱元年盟于宿傳榖梁又曰無君制在公矣當可納謂納子糾而不納故惡内也啖子曰讐人之子本不當納有何惡乎下伐齊納糾義亦同此左氏曰初襄公立無常鮑叔牙奉公子小白出奔莒趙子曰按莒近齊之小國而襄公强而無道大夫如何輙敢将公子奔之而獲安乎杜注云公子紏小白並僖公之子尤非也若然則不合書子糾又非讐人之子公納之不應有深譏故榖梁云襄被弑二公子乃出奔此説為正言皆襄公之子公伐齊納子糾公羊曰納者入辭其言伐者何伐而言納猶不能納也按此直書事實如何不稱納乎若不言伐齊則納糾于何國乎又曰不稱公子君前臣名也按魯君之前稱齊公子復有何過况是史家之辭非君前之義也及齊師戰于乾時我師敗績公羊曰内不言敗此其言敗何伐敗也趙子曰納讐䘮師惡之大者諱之不足故明書以示譏傳稱伐敗如何為義不可解也又曰曷為不言公不與公復讐也趙子曰按例公敗例不書公不與復讐有何義也齊人取子糾殺之左氏曰子糾親也請君討之公羊曰脅我而殺之趙子曰按論語云桓公殺公子糾召忽死之則知齊自殺之非魯殺也若實魯殺則當書云齊人使我殺子糾不應云取也十年宋人遷宿公羊曰以地環之也趙子曰據此乃將己地繞之非遷彼之義榖梁曰遷亡辭也遷以移徙為名非謂亡又曰猶未失其國家以徃也豈有遷彼將為附庸而云未失國家乎齊師宋師次于郎公敗宋師于乗丘公羊云伐則其言次何齊與伐而不與戰故云伐也趙子曰按經文實未伐而敗故不言伐爾又曰我能敗之故言次趙子曰若然則但書敗義不明乎何假言次榖梁曰次止也畏我也他處皆然趙子曰夫子書次皆罪興師豈譏其怯懦哉若當譏怯懦則當襃勇力春秋乃是鼓亂之書也荆敗蔡師于莘以蔡侯獻舞歸公榖皆云蔡侯何以名獲也啖子曰晉侯之獲何以不名乎故知以其失地故名爾公羊解經文不言獲註謂與凡伯之獲同義啖子曰呉滅胡沈之君獲陳夏齧齊國書何得書獲乎趙子曰公羊曰州不若國是也又云國不若氏按請侯無稱氏之例又云氏不若人人不若名按春秋無氏獨行之例唯崔氏出奔尹氏卒自是譏世卿不同常例假如崔氏出奔豈惡於崔杼弑君哉又云名不若字字不若子是也於此用之不當移于閔二年齊高子來盟下施之榖梁又云以歸猶愈乎執也趙子曰稱以者所以重責蔡侯義見本傳言愈殊非也荘十一年宋大水公羊曰外災不書及我也榖梁曰外災不書此何以書王者之後也按外災來告則書二傳不達此義故各穿鑿爾王姬歸于齊公榖皆云志其過我也按書其歸為魯主婚爾無他義榖梁他處即云為之中者歸之與此又自相反矣荘十二年紀叔姬歸于酅公榖並云隱其失國故書趙子曰春秋紀教迹爾豈為憂喜生文乎荘十三年齊侯宋人陳人蔡人邾人㑹于北杏榖梁曰是齊侯宋公也啖子曰若是齊侯宋公而書曰人不命之卿又如何書乎公㑹齊侯盟于柯公羊曰荘公將㑹桓公曹子曰君之意如何荘公曰寡人之生則不如死曹子請劫之云云荘公許之遂劫桓公云城壞壓境請汶陽之田桓公與之又云要盟可犯而桓公不欺趙子曰按桓公未嘗侵魯地及盟後未嘗歸魯田且荘公與齊大讐襄公之時猶歡好不絶不應至桓公却生讐怨其事迹既妄又不可以訓故畧之荘十六年冬㑹齊侯宋公陳侯衞侯鄭伯許男曹伯滑伯滕子同盟于幽榖梁曰不言公外内寮一疑之也趙子曰按内臣與齊襄公徃來未嘗有阻豈於桓公更有疑哉此直夫子定貶責之㫖何關内外寮也春秋集傳辨疑卷三
