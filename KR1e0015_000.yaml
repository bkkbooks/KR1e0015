body:
  text: 春秋集傳辨疑春秋類提要臣等謹案春秋集傳辨疑十卷唐陸淳所述啖趙兩家攻駁三傳之言也栁宗元作淳墓志稱辨疑七篇唐書藝文志同吳萊作序亦稱七篇此本十卷不知何人所分按元延祐五年嘗從臣言以唐陸淳所著春秋纂例辨疑微旨三書令江西行省鋟梓其殆分於是時歟淳所述纂例一書蓋啖助排比科條自發筆削之旨其攻擊三傳總舉大意而已此書乃舉傳文之不入纂例者縷列其失一字一句而詰之故曰辨疑所述趙説為多啖説次之冠以凡例一篇計十七條但明所以刪節經文傳文之故其去取之義則仍依經文年月以辨説之中如鄭伯克段傳啖氏謂鄭伯必不囚母殊嫌茫無所徴直以臆斷以是為例豈復有可信之史况大隧故迹水經注具有明文安得指為左氏之虛撰如斯之類不免過於疑古又如齊衛胥命傳其説與荀子相符當時去聖未逺必有所受而趙氏以為譏其無禮如斯之類多未免有意求瑕又如叔姬歸於紀傳榖梁以為不言逆逆之道徴淳則謂不言逆者皆夫自逆夫禮聞送媵不言逆媵傳固失之禮聞親迎妻不聞親迎娣姪淳説亦未為得如斯之類亦不免愈辨而愈非然左氏事實有本而論斷多疏公羊榖梁每多曲説而公羊尤甚漢以來各守専門論甘者忌辛是丹者非素自是書與微旨出抵隙蹈瑕往往中其窽會雖瑕瑜互見其精核之處實有漢以來諸儒所未發者要與鑿空杜撰橫生枝節者異也乾隆四十三年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀春秋集傳辨疑凡例集傳取舍三傳之義可入條例者於纂例諸篇言之備矣其有隨文解釋非例可舉者恐有疑難故纂啖趙之説著辨疑有三傳繁文可以例包者則但舉例如後不復繁釋學者將覽辨疑宜先觀纂例取舍義及此卷首諸凡之意凡三傳敘事有先後於經者今皆移於本經之下凡三傳釋經之例或移於事首發之或趙氏纂之入總傳其當否各於纂例本條中論之備矣凡三傳敘事不主於經文又無别意可通者皆不入凡三傳釋經文義皆同者則唯舉左氏而注云公穀同者省文之義也公穀同者但舉公羊凡三傳敘事雖同而穀梁文義尤備者亦但舉穀梁而注云左氏公羊之意同凡三傳説事迹雖與經通其文義繁冗者皆略取其要凡左氏敘戰滅及奔殺等事委曲繁碎今悉略其文舉成敗大綱而已凡左氏無經之傳今皆不取其有因盟會征伐等事而説忠臣義士及有讜言嘉謨與經相接者略取其要若説事迹與經符而無益於教者則亦不取凡公穀日月時例一切不取其説已見日月議凡公穀曷為何以何也之類悉皆繁文於理不安今皆刪之時有取者以便屬文之義爾無他意焉凡公穀發例皆事事言之今或發於事首或移於事終而注云例見某年皆不重出凡公羊云託始焉爾既始於隱公則從始者書之何云託乎故皆不取凡公羊無傳之經或云此事無聞焉爾今以此語無義徒為繁文悉不取凡公羊於災異之下一一皆云記異也今但以災異之首總論記事之意後皆隨事注中言之省文之義也凡公羊解經事理雖不相當其文義有可存者則移於他年可施處附之如桓八年穀伯鄧侯下説失國之君類今移于莊五年紀侯丢國下用之之類是也公穀多自云公羊子曰穀梁子曰及引尸子魯子曰今但目其傳而去其某子字啖趙取捨三傳義多舉例而言不必隨文皆説今恐學者未精難以例曉故推兩家之例悉隨文辨之其有不言啖子趙子曰者是也
