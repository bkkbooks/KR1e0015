body:
  text: 春秋集傳辨疑卷二唐陸淳撰桓元年春王正月榖梁曰元年有王所以治桓也趙子曰按實不治何得言治也舊說又云元年有王兾是年內有討所以書之豫謂去王字理由夫子不因舊史夫子修經時豈不知此年竟不討乎何須存之也又云末年有王言王終不能討所以書之若然者總除王字理不益明乎按十五年王崩至十六年嗣王既立年月已深過不在嗣王何不書王乎足明非責王明矣但為學春秋者慣習於王正月不覺遂四處妄加耳聖人辭意朗然平暢若譏王則王未崩之前悉去王字可矣安肯乍見乍隱煩碎若此乎詳經意直以桓公不顧王法故去其王字以見其罪耳公即位榖梁曰繼故不言即位正也趙子曰禮當不即位豈空言哉故去其言字又曰先君不以道終己正即位是無恩於先君也趙子曰但言與聞乎弒義己備矣鄭伯以璧假許田左氏曰鄭人請復祀周公按鄭莊之言無所不知安肯請祀非其祖乎不近人情矣說已具隱八年公羊曰天子之郊諸侯皆有朝宿之邑啖子曰其皆字義同隱八年又曰曷為謂之許田諱取周田也按許田實魯朝宿之邑不得謂之周田又曰繫之許近許也按許田自是其邑名何關近許之事乎若近許即謂之許田近鄭亦謂之鄭田乎若然則無常名矣公及鄭伯盟于越榖梁曰越盟地之名按此不要解自可知矣桓二年春王正月榖梁曰桓無王其曰王何也正與夷之卒趙子曰十一年鄭伯卒十二年衛侯晉卒何不正之乎故知皆謬而傳因謬强為義也十年有王云正曹伯卒亦同此說宋督弒其君與夷及其大夫孔父左氏曰宋華督見孔父之妻于路遂弒殤公啖子曰古者大夫猶皆乘車其妻固當乘之不可在路而見其貌蓋以舊言孔父義形于色而作傳者以為女色之色遂妄為此說耳且見榖梁說及之義極明不足疑也榖梁曰何以知其先殺孔父也臣既死君不忍稱其名趙子曰按孔父之事自是史冊載之非殤公自書也何關君之不忍乎又曰孔氏父字諡也啖子曰孔字父美稱也孔氏之先皆以字連父故有弗父金父若孔為氏豈世世改乎又春秋時名嘉者多字孔是其證也又曰不稱名蓋為祖諱也按春秋魯國之史也非夫子家傳安得祖諱乎滕子來朝趙子曰滕侯爵自齊桓霸後方與把薛皆降號以從會位此時未有霸者無人黜之故知在喪也公會齊侯陳侯鄭伯于稷以成宋亂公羊曰內大惡諱此其目言之何逺也趙子曰按逆祀僖公昭公出遜皆書之何得云大惡諱乎又若以年逺不諱則桓公為齊所殺何不明書乎由是言之可諱則諱可譏則譏不以年月逺近為異也榖梁曰以者內為志焉爾趙子曰言以者明四國同㑹以成此事何獨言公為志乎又曰取不成事之辭而加之焉於內之惡而君子無遺焉爾趙子曰據經文乃直書事實耳有何加乎取郜大鼎于宋納于太廟左氏說僖伯諌辭自清廟茅屋至聲明以發之趙子曰據納鼎直以受凶賂而納于太廟故譏耳非為服章名數有愆故不當别記煩文也且夫議禮度者貴識其安上治民之大體若夫服章名數之差品禮之末節也今事不相涉故當捨爾孔聖既喪之後學者莫識大本所務唯此而已故左氏傳及國語并戴聖禮記多記此等學者當求其逺大公榖並解郜鼎之名云云啖子曰郜鼎之名猶如和氏之璧封父之繁弱之類無他義也榖梁又云成人之亂受賂而退以事其祖以周公為弗受啖子曰假如納於他廟豈為可乎何獨引周公弗受蔡侯鄭伯會于鄧公羊曰離不言會趙子曰按前後兩國皆書㑹傳妄也公至自唐左氏曰反行飲至舍爵策勳焉禮也趙子曰此當移於十六年至自伐鄭之下附之此非征伐從君出入乃是常事也何勳之有又曰特相㑹往來稱地讓事也趙子曰按成㑹而歸即非止於讓以㑹告廟有何不可此不達內外異辭之例妄為異說爾且諸書至自㑹者所㑹悉非魯地故知四處至稱地皆魯地故也榖梁曰桓無㑹其致何也按前後桓公言㑹多矣桓三年齊侯衛侯胥命于蒲左氏曰不盟也趙子曰凡㑹遇亦不盟何獨胥命公榖皆云美其不盟約言而退近正也趙子曰按㑹遇亦並不盟皆是約言而退何得獨異此文且二君並非賢君又無殊異之迹據經文直譏其無人君之禮爾公子翬如齊逆女左氏曰修先君之好故曰公子啖子曰若使異姓之臣往復何稱乎且惠公之薨桓公尚幼則知惠公之時未謀婚姻何得言先君之好假或早謀而今修之則當納幣之時致命何為於逆乃言修好乎齊侯使其弟年來聘左氏曰致夫人也趙子曰按成九年季孫行父如宋致女仲尼書之以示譏此若致女亦當書之不容於隱左氏見彼有致女之文此又新婚之後而至遂附㑹妄說耳桓四年春狩于郎左氏曰書時禮也趙子曰凡搜狩之禮常事不書故知公羊義是天王使宰渠伯紏來聘左氏曰父在故名趙子曰若以其代父攝行卿事則經文當依仍叔之子為文若非代父即當依常例何得加名故知為貶故名爾且王人子突稱字以褒則此以名為貶亦明矣公羊曰其稱宰渠伯紏何下大夫也按例天子大夫皆稱字何獨下大夫乎桓五年甲戌己丑陳侯鮑卒左氏曰再赴也於是陳亂文公子他殺太子免而代之公疾病而亂作國人分散故再赴趙子曰豈有正當禍亂之時而暇競使人赴告哉假令實再赴夫子亦當詳定取其實日何乃總載之乎且傳言公疾病而亂作此文亦據陳國史而記之驗此則經文甲戌下當記陳他作亂之事今簡脫之爾左氏不達此意遂妄云再赴也公羊曰何以二日卒之㤜也狂也甲戌之日亡己丑之日死而得君子疑焉故以二日卒之啖子曰按人君雖狂而去亦當有臣子從之榖梁曰甲戌之日出己丑之日得不知死之日故舉二日以包之啖子曰三傳皆不知有闕文之義故多造事端爾豈有人君走出臣下不追逐昧其死日乎齊侯鄭伯如紀公羊曰外相如不書此何以書離不言㑹也啖子曰按前後兩國言㑹多矣此書者左氏說從告之義是也天王使仍叔之子來聘左氏曰弱也趙子曰假如年長而代父出便得不譏乎左氏不推褒貶之義但見稱子則云爾夏城祝丘榖梁曰譏公不修德政恃城以安民按但譏不時即可矣安知恃城乎蔡人衛人陳人從王伐鄭左氏曰鄭伯禦王祝𥅆射王中肩云云趙子曰此並妄也蓋鄭國愚史不知敗王之惡射王之逆但欲以勝天子為美故左氏因之若信有此事則經不合不異其文若云不告被射故不書則諸侯惡事豈肯來告夫子何由貶責之足明因納於史者夫子精求其失而書之爾從告之義已詳見隱十一年傳榖梁曰從者何為天王諱伐鄭按經文直書事實亦無所諱州公如曹趙子曰據經文直書譏其外交故書曰如曹左氏曰度其國危遂不復若國危而出奔若在後方有危難當依初行時意書之自不相妨公榖皆云過我也解所以書趙子曰或大夫見而知之或來告故知之或為其自曹而來故知之何必過我乎桓六年實來左氏曰來朝趙子曰若行朝禮經當書之故知妄也公羊曰實來者猶是人來也化我也趙子曰實實也承上文無異事故曰實來公榖之說皆鄙淺故不取壬午大閲公羊曰何以書蓋以罕書也按以其非常故書爾非為少也榖梁曰蓋以觀婦人也按經無異文傳自穿鑿蔡人殺陳他公羊曰他陳君也曷為謂之陳他絶也趙子曰按左氏傳他殺太子之賊故經不以人君稱之公榖不達此意妄云淫于蔡及淫獵于蔡不近人情榖梁又云何以知其是陳君兩下相殺不道按前後兩下相殺書者多矣此傳妄也子同生左氏曰公與文姜宗婦命之趙子曰左氏誤謂宗婦為同宗之婦遂妄云爾當去之公羊曰喜有正也趙子曰春秋一字皆為經邦大訓不為憂喜生文榖梁曰疑故志之注云文姜淫佚疑非桓公之子此乃委巷之談不近人理桓七年焚咸丘公羊曰焚之者何樵之也啖子曰火攻之事非一途安知樵之又曰疾始以火攻也趙子曰凡事是非皆一一明之此又非便為常何獨譏始又曰曷為不繫乎邾國之也趙子曰不繫邾者邑地不繫於國春秋之常也國之有何義哉又曰曷為國之君存焉爾啖子曰咸丘雖焚邾竟不滅焉知君存榖伯綏來朝鄧侯吾離來朝左氏曰賤之也此說不明故不取公榖並云失國之君趙子曰蓋以其書名故云爾據諸失國之君唯隨敵以歸者則書名若奔他國並不書名說見本例則二國之於例固非失國明矣假令實非奔魯而公待以朝禮之故即當書云榖伯鄧侯來奔某日朝公不應越例書名而沒其來奔也或曰據禮云諸侯失地則名滅同姓則名不云用夷禮則書名今忽作此釋於理安乎答曰禮記者因說春秋之義遂記得此語而録之非自古有此例也諸侯失國自辱其身猶至書名况行夷禮辱及宗廟見輕儕列而得不名乎三家說春秋義例不盡者多矣又何足怪桓八年正月己卯蒸公羊曰譏亟也啖子曰此書之以彰下文爾非譏也榖梁曰蒸冬事也春興之志不時也趙子曰正月之蒸不失時也義見纂例郊廟例經為五月又蒸故書此以明一歲再蒸若不書即似春有故不蒸夏乃蒸耳啖說是也夏五月丁丑蒸榖梁曰蒸冬事也春夏興之黷祀也趙子曰書春是為下文起耳故去其春字祭公來遂逆王后于紀左傳曰禮也趙子曰若合禮則常事不書據經言來遂足明譏矣公羊曰何以不稱使婚禮不稱主人趙子曰此說非也已見隱二年紀裂繻來逆女傳假令婚禮實不稱主人即至紀之日但致魯命爾來魯未是婚禮何須不稱主人乎實使來而不稱王命則如何致命乎無理之極舊說云天子娶於諸侯必使同姓諸侯主之亦恐非也魯侯為天子嫁女為女卑於魯侯故可也至於天子娶后至尊諸侯如何為之主哉且禮經亦無此說春秋之文又殊不爾故知其非也又云大夫無遂事此言遂使我為媒可則因往逆矣趙子曰假如使可專逆王后不白于君乎又曰女在國稱女其稱王后何王者無外其辭成矣亦非也若但書逆女則是祭公自逆故須言王后爾榖梁曰其不言使何不正其以宗廟之大事即謀於我趙子曰必若實譏天王言使不更昭著乎今不言使即罪全歸祭公桓九年紀季姜歸于京師榖梁曰為之中者歸之趙子曰王后者天下之母不同於諸侯之女自合書之不關魯為媒乃書之事桓十年公㑹衛侯于桃丘弗遇榖梁曰不遇者志不相得趙子曰經意直譏其無信爾豈論其相得不相得乎齊侯衛侯鄭伯來戰于郎左氏曰來戰于郎我有辭初北戎病齊在六年諸侯救之云云齊人致餼魯以周班後鄭鄭人怒云云趙子曰據左氏魯以周班後鄭既是正禮鄭雖小恨豈至興師即合當年構禍豈有經五年之後方合諸侯報此小怨乎夫五年之後諸侯讐黨亦已改矣怨望之心亦已衰矣理在目前不足疑也但為無過故異耳左氏遂引往前小隙附㑹之故但存其我有辭一句而已公羊曰郎者何吾近邑也按經但書戰地本不分其近逺假如逺則不書戰地乎榖梁曰來戰者前定之戰也趙子曰此說非也言來者責三國不當來爾言戰者諱敗之常也又曰不言其人以吾敗也趙子曰按為公戰敗故不言敗以諱之若大夫戰則當書之不容悉隱也又曰不言及者為內諱也趙子曰按直言來戰言其不當來爾若為內諱則但不書敗何須不言及諸內戰皆言及豈是不諱哉桓十一年宋人執鄭祭仲公羊曰祭仲不名賢也何賢乎祭仲以為知權也云云啖子曰以廢君為賢不可以訓榖梁曰宋人者宋公也其曰人何貶之也按執大夫例稱人不可别為義鄭忽出奔衛公羊曰忽何以名春秋伯子男一也辭無所貶傳意解不言子按春秋前後例伯子男皆殊稱非一也又鄭伯爵也若稱子何關爵乎故不稱子者責其不能嗣先君爾柔㑹宋公陳侯祭叔盟于折公榖皆曰柔者何吾大夫之未命者也趙子曰凡未命大夫不書氏已見隱公卷及都見名位例故去此以省文也桓十二年十一月丙戌公㑹鄭伯盟于武父丙戌衛侯晉卒榖梁曰再稱日决日義也趙子曰再丙戌誤文也傳以日月為例故妄云爾及鄭師伐宋丁未戰於宋榖梁曰不言與鄭戰耻不和也啖子曰公羊說此義是也此傳不知省文之義故云爾且按自此後魯常與鄭和而同伐宋故知此傳誤矣桓十三年公㑹紀侯鄭伯已已及齊侯宋公衛侯燕人戰齊師宋師衛師燕師敗績左氏曰宋多責賂於鄭鄭不堪命故以紀魯及齊宋衛燕戰趙子曰據經文內兵以紀為主外兵以齊為主若實為鄭宋而戰即當以鄭宋為兵主何得主齊紀乎且責賂小事止當二國自不和無容諸侯為戰按六年㑹紀云謀齊難也是歲紀又來朝請以王命求成於齊公告不能今為兵主以戰于紀足明齊以三國之師伐紀欲滅之公與鄭救之而勝遂免禍至十七年乃㑹于黃以平之其蹤跡明著若此不然紀懼滅之不暇豈敢主兵而助鄭乎若助鄭止當戰于宋鄭之郊無為戰于紀也據鄭伯新為宋所主而去年遽與魯及宋戰今年又助紀戰則必為求賂多之故今移責賂之文於去年公欲平宋鄭之上庶為允當也公羊曰曷為後日恃外也趙子曰按先㑹而後日成㑹而後戰也恃外有何義乎又曰何以不地近也趙子曰不地者有紀都也無他義榖梁說是桓十四年春無冰榖梁曰時燠也按此不解亦可知秋八月御廪災乙亥嘗左氏曰書不害也按八月嘗非時也又以災之餘而祭譏不敬爾非為不害而書公羊曰嘗常事何以書譏嘗也御廩災不如勿嘗而已趙子曰按周之八月夏之六月也不合嘗而嘗云常事非也又云御廪災不如勿嘗而已按有災當警懼修飾而改卜何得便闕先君之祀乎榖梁曰御廪之災不志趙子曰按此乃大故何得不志又曰必有兼甸之事注云夫人兼行甸人之事恐謬也此旬字爾言祭事當久辦非一旬所了傳寫者見前有甸字遂改爾又云譏未易災之餘而嘗據易災可一日而辦况其間經兩日何得不辦今為其足以明祭禮宜兼存之宋人以齊人蔡人衛人陳人伐鄭左氏曰報宋之役云云以大宫椽歸為盧門之椽趙子曰此事煩碎並不關教迹故不取又若實毁其大廟非禮之甚經必書之益以知謬也桓十五年天王使家父來求車榖梁曰諸侯時獻於天子以其國之所有故有辭讓而無徵求趙子曰天子受貢常禮也亦何所讓故去其故有辭讓四字鄭伯突出奔蔡公榖皆云名突譏奪正也按諸侯失地皆名之不可為義鄭伯突入于櫟公羊曰曷為不言入于鄭末言爾按實未入鄭何用强說公㑹宋公衛侯陳侯于袲伐鄭榖梁曰地而後伐疑辭也非其疑也趙子曰按謀伐之初豈有不懷疑者疑者心中之事何由知之今據經文因成會禮而後行伐爾辭意甚明無他義也桓十六年冬城向左氏曰書時也啖子曰按下有十一月縱是同月亦今之九月農工未畢不可興役衛侯朔出奔齊公羊曰何以名得罪于天子也按失地諸侯皆名之不可强生義榖梁曰朔之名惡也天子召而不往也啖子曰諸侯失地則名春秋之常也左氏得其事實矣桓十七年及宋人衛人伐邾左氏曰宋志也趙子曰據例稱及者皆內之志云宋志非也冬十月朔日有食之左氏曰不書日官失之天子有日官諸侯有日御云云趙子曰此說非也凡不書或史官闕之或年深寫誤何關日官日御乎史官豈不知朔及每日甲子乎何待日官日御哉桓十八年公與夫人姜氏遂如齊公羊曰何以不言及夫人夫人外也夫人外者何內辭也其實夫人外公也趙子曰聖人設教不應如此煩碎榖梁說伉敵之義近之矣榖梁曰不言及夫人何也以夫人之伉弗稱數也趙子曰但譏驕伉義則昭然又云弗稱數即煩碎矣故去其弗稱數三字公薨于齊榖梁曰薨稱公舉上也啖子曰請侯雖五等臣子皆曰公從高稱也生時皆然何用解薨葬我君桓公榖梁曰葬稱我君接上下也趙子曰按稱我君以别他國且君敬辭爾春秋集傳辨疑卷二
