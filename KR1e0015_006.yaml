body:
  text: 春秋集傳辨疑卷六唐陸淳撰僖十七年夏滅項公榖皆云齊滅之為齊桓諱也啖子曰按其文義乃是魯諱豈可為齊諱而魯自取惡乎齊桓雖賢滅項非合義何得為之諱乎為齊桓而稱魯君非臣禮僖十八年春王正月宋公曹伯衛人邾人伐齊夏五月戊寅宋師及齊師戰于甗齊師敗績公羊曰戰不言伐此言伐何宋公與伐而不與戰啖子曰此戰與伐各是一事故不得舉重也又伐時曹衛邾三國同之戰則唯宋獨戰事須先書伐也又云曷為不使齊主之據例皆以主及客與襄公之征齊也啖子曰按左氏傳乃是齊師伐宋師故以宋為主也此傳不知事迹故穿鑿爾榖梁曰戰不言伐客不言及言及惡宋也啖子説同公羊邢人狄人伐衛榖梁曰狄其稱人何善纍而後進之按狄加人字以成文辭爾不可云邢人狄伐衛故也有何善乎僖十九年春王三月宋人執滕子嬰齊夏六月宋人曹人邾人盟于曹南鄫子會盟于邾己酉邾人執鄫子用之左氏云宋公使邾文公用鄫子於次睢之社趙子曰若然則宋為首惡邾雖諸侯不當受其無道之命然勢卑力屈罪猶輕於宋經文當兩譏之云宋人使邾人不當獨罪邾也且宋襄以仁義為已任故不重傷不禽二毛豈肯殺諸侯以祭淫祀乎左氏見上文盟于曹南又續云鄫子會盟于邾以為宋公本召鄫子鄫子來晚故宋公回至邾鄫子乃到所以怒之曽不知曹南之盟自是大夫盟爾若宋公自曹還宋何得路出于邾殊為乖謬也左氏敘子魚諌云今君一會而虐二國之君且三月執滕子六月乃用鄫子而云一會其謬可知也凡左氏謬釋經文必廣加文辭如君氏卒之比欲以證實其事令後不疑他皆若此學者宜深詳此弊左氏又云用之於次睢之社以睢水在宋附會而為此説據鄫子會盟于邾何得至宋哉公榖皆云用之者叩其鼻以血社也趙子曰詳觀經文上言會盟下言用之緣盟用之同於牲也二傳云社臆度之爾又宋人曹人邾人盟于曹南左氏榖梁並作宋公誤也據曹伯不與盟故知公羊是也宋襄爾時自為霸主若自來曹地則曹伯邾人何敢身不至而令大夫盟乎左氏既云用鄫子是宋公之命故書宋公符其言爾衛人伐邢左氏曰於是衛大旱卜有事於山川不吉有事祭也寧莊子曰昔周飢克殷而年豐今邢方無道諸侯無伯伯長也天其或者欲使衛討邢乎從之師興而雨啖子曰邢之無道未應如紂衛侯之賢不可比於武王皆飾妄之辭也故不取梁亡榖梁曰梁亡如加力役焉湎不足道也趙子曰經中不可書云湎於酒色而亡何用此説僖二十年春新作南門榖梁曰南門者法門也按南門者城之南門爾何用法門之説也郜子來朝公羊曰失地之君也按經無異文無所據也西宫災榖梁曰閔宫也按經文謂之西宫直是僖公之西宫爾何關閔公乎齊人狄人盟于邢榖梁曰邢小其為主何為主乎救齊啖子曰邢雖小國何妨為地主妄云救齊無所據也僖二十一年夏大旱左氏曰公欲焚巫尫臧文仲諌云云公從之是歲也飢而不害啖子曰按經書大旱明為災也安有年飢而人不害乎此蓋史官美公從諌故有此言不知於理不通也但取其諫詞而略其是歲也飢而不害一句宋公楚子陳侯蔡侯鄭伯許男曹伯會于雩執宋公以伐宋公羊解經不言楚子執之則謂不與其能執趙子曰不獨言楚子執者以病諸侯不宗中國爾不與夷狄有何義乎楚人使宜申來獻捷公羊曰曷為不言捷乎宋為襄公諱也啖子曰上言伐宋此言獻捷必知宋捷從省文爾為襄公諱有何義乎公會諸侯盟于薄釋宋公榖梁曰外釋不志此其志何也以公之與之盟目之也按釋他諸侯公不與會故不得書爾非謂外釋不志也僖二十二年宋公及楚人戰于泓宋師敗績公羊美宋襄之守信云文王之戰亦不過此啖子曰文王以仁義行師不應似宋襄徒守匹夫之信不知事機也榖梁云春秋三十有四戰未有以尊敗乎卑以師敗乎人者此人者責之也啖子曰王師敗績于貿戎豈非尊敗于卑乎又稱人者亦常例爾皆不可别為義説榖梁又數襄公之罪云伐齊之喪按納孝公是也亦不可舉為罪故略之僖二十三年宋公兹父卒公榖見不書葬皆為義説按例凡諸侯葬與不葬從魯會與不會爾無他義把子卒左氏曰把成公卒書曰子把夷也趙子曰蠻夷之君雖大曰子降而稱子亦似有理薛乃稱伯把亦多稱伯有何理哉左氏不達國小降名之意誤為此説舊説皆云赴告之禮同夷狄故貶之且升降名位當由王者若魯史專自貶降爵位乃春秋自為亂也且春秋若實專以削黜為義則諸侯惡事非一何不黜其名位哉又已後把或稱伯即云捨夷禮或稱子即云復用夷禮彼二王之後常與大國盟豈是兒童屢捨屢用哉益知是霸主升降之爾左氏解稱子義皆放此名位例論之備矣僖二十五年宋蕩伯姬來逆婦公羊曰其言來逆婦何兄弟辭也按經文直書其事以明非禮爾兄弟有何義乎宋殺其大夫公羊曰何以不名宋三世無大夫三世內娶也啖子曰三世無大夫迂僻之甚榖梁曰其不稱名姓以其在祖之位尊之也啖子曰夫子因魯史而垂訓宋大夫祖位同者書姓名有何妨乎秋楚人圍陳納頓子于頓榖梁曰蓋納頓子者陳也按經文楚自納之何關陳事公會衛子莒慶盟于洮榖梁曰莒無大夫其曰莒慶何也以公之會目之也趙子曰凡事接於魯雖非命卿皆書名傳不達此例遂穿鑿爾僖二十六年齊人侵我西鄙公追齊師至酅弗及公羊云其言至酅弗及何侈也榖梁曰大之也弗及內辭也趙子曰直書之以譏內之無戎備爾何用曲為義公子遂如楚乞師左氏曰東門襄仲臧文仲如楚乞師趙子曰若臧文仲實往經文不當不書又云臧孫見子玉而道之伐齊宋以其不臣也趙子曰當時非勤王之行云責其不臣亦非也僖二十七年冬楚人陳侯蔡侯鄭伯許男圍宋公羊曰此楚子也其稱人何貶曷為貶為執宋公貶故終僖之篇貶啖子曰凡褒貶各於其事豈有終篇貶乎故榖梁義是僖二十八年春晉侯侵曹晉侯伐衛公羊曰曷為再言晉侯非兩之也然則何以不言遂未侵曹也未侵曹則其言侵曹何致其意也趙子曰聖人立教猶云不逆詐豈未行其事而先致其意乎榖梁曰再稱晉侯惡也趙子曰凡書侵伐皆罪之何得再方為惡乎公子買戍衛不卒戍刺之公羊曰不卒戍者何不卒戍者內辭也按經文直書其事以見意爾何內辭乎榖梁曰先名後刺殺有罪也按此依事實次第書之不得别為義説又以刺公子偃考之例又不成也三月丙午晉侯入曹執曹伯畀宋人公羊曰畀者何與也其言畀宋人何與使聼之也啖子曰宋非侯伯又非盟主何得聼訟乎此傳不見事迹臆説爾又云曹伯之罪何甚惡也臆説爾夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績公羊曰此大戰也曷為使微者子玉得臣也子玉得臣則其稱人何貶曷為貶大夫不敵君也按未命之卿例書人有何貶乎五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土陳侯如會公羊曰其言如會何後會也啖子曰若是本召盟之國諸侯既盟則雖後至亦當盟既不盟明非本召也左氏傳釋云云桓文之伯不書錫命或曰以不告故不書爾答曰按錫命為侯伯事之大者無不告之理且公在會不容不知所以不書蓋有微旨也公朝于王所公羊曰曷為不言公如京師天子在是也趙子曰言王所則明非京師矣何用更言天子在是乎榖梁曰朝不言所言所者非其所也趙子曰稱王所即王所在爾無他義左氏曰王子虎盟諸侯于王庭趙子曰若不然則經文何得先言盟而後言朝乎豈有未朝王而盟于王庭乎據經文諸侯既盟之後王乃至方行朝禮義甚昭然天王狩于河陽左氏曰言非其地也趙子曰王者無外豈有畿外則非其地乎此但記所至之處不可别為義也又云且明德也按晉召王而朝之愈乎不朝爾夫子不以為罪以功補過此乃功勤之中未及於禮而謂之為德無乃過乎若謂此為德則率諸侯朝于京師者謂之何哉故以德為目不施於霸者壬申公朝于王所公羊曰其日何録乎內也趙子曰榖梁説闕月是也若言內書日何不書月乎榖梁曰朝於廟禮也於外非禮也趙子曰按天子巡狩諸侯會朝于方嶽之下何得云朝于外即為非禮哉且物情人理豈有天子出巡而諸侯不朝乎榖梁又説不書月失其所繫也以為晉文公之行事為己傎矣故日不繫月猶諸侯不宗天子趙子曰此傳説闕月之義則當矣言為文公則穿鑿也故裁其上文晉人執衛侯歸之于京師公羊云歸之于者何歸于者何歸之于者罪已定矣歸于者罪未定也趙子曰歸于與歸之于其義一也或傳寫衍縮耳不煩妄釋又云衛侯之罪何殺叔武也何以不書為叔武諱也春秋為賢者諱何賢乎叔武讓國也趙子曰據理反是為衛侯諱是掩惡也何名為叔武諱且凡褒賢之義但稱字爾不聞諱殺也又云此晉侯也其稱人何貶曷為貶衛之禍文公為之也按例執諸侯皆稱人不要别生義榖梁曰此入而執其不言入何也不外王命於衛也此傳不知與元咺訟之事故穿鑿爾又曰歸之于京師緩辭也不早歸京師也趙子難之義同公羊衛元咺自晉復歸于衛公羊曰自者何有力焉者也此執其君其言自何為叔武爭也按例凡大夫還悉書所自無他義曹伯襄復歸于曹榖梁曰天子免之按晉以曹伯畀宋人非天子之命也僖二十九年春介葛盧來公羊曰介葛盧者何夷狄之君也啖子曰經不言狄恐非本夷狄也又曰何以不言朝不能乎朝也按公實不在何所朝乎會王人晉人宋人齊人陳人蔡人秦人盟于翟泉左氏云卿不書罪之也趙子曰據例稱人者皆非外大夫之惡也公自為之爾冬介葛盧來趙氏曰啖云不於廟受故不言朝此説是也或曰公羊此年傳云何以不言朝不能乎朝也此義移用於此豈不可乎答曰桓十五年邾人牟人葛人來朝若以為能行朝禮即儀父不應却貶稱人故知用夷禮爾但為廟受故書朝葛盧或但為事而來本非來朝所以不廟受故直書來爾僖三十年公子遂如京師遂如晉公羊曰大夫無遂事趙子曰此亦受君命而行何得指大夫也又云此其言遂何公不得為政爾啖子曰按僖公未失政此説非也榖梁曰以尊遂乎卑此言不敢叛京師也趙子曰京師回便如晉故言遂爾不敢叛京師有何理乎或曰書遂者譏奉王不專使也據先王室後盟主未為失禮亦非譏也凡遂者繼事辭爾皆以實書其褒貶即觀其上下之文乃辨之爾此言遂如晉直書也遂及齊侯宋公盟褒也遂逆王后于紀貶也不可直以遂字為義例僖三十一年春取濟西田左氏曰取濟西田分曹地也使臧文仲往云云趙子曰實然即往於例不合不書且二十八年執曹伯不應經四年方分其地公羊云晉侯執曹伯此經無執文故知二傳皆妄説也若實晉人使然亦當别為文不應依常取例書之夏四月四卜郊不從乃免牲猶三望公羊曰禘嘗不卜郊何以卜卜郊非禮也卜郊何以非禮魯郊非禮也啖子曰成王思周公之德故令魯有郊禘何得云非禮傳妄矣冬把伯姬來求婦公羊曰其言來求婦何兄弟辭也按經文直書之以志其非禮爾兄弟之辭有何義乎僖三十三年晉人及薑戎敗秦師于殽公羊曰襄公親之則其稱人何貶曷為貶君在乎殯而用師危不得葬也啖子曰若反貶稱人乃是隱其惡也如何懲勸乎隕霜不殺草李梅實榖梁曰未可殺而殺舉重也可殺而不殺舉輕也趙子曰未可殺而殺謂定元年殺菽者此説非也定元年草不死唯菽死故紀其災也且今百草未死豆苗先枯即知豆易凋不得云舉重也此則百草俱不死冬溫故也乃書事實何舉輕之有乎春秋集傳辨疑卷六
