body:
  text: 春秋集傳辨疑卷七唐陸淳撰文元年天王使叔服來㑹塟榖梁曰重天子之禮也趙子曰夫子意在辨是非豈惟重之而已夏四月丁巳葬我君僖公左氏曰緩也按此正合五月之禮也天王使毛伯來錫公命榖梁曰禮有受命無來錫命錫命非正也趙子曰按秦漢已後郡縣天下天子益尊不比三代猶就郡加守相秩何得無錫命乎葢不知譏其賞無功而遂妄為義爾公孫敖如齊左氏云穆伯如齊始聘焉禮也趙子曰此據春秋時言之非禮經本意故去其禮也二字文二年作僖公主左氏云烝嘗禘于廟趙子曰禘本合於周公廟用之説在閔二年魯僭用於荘公左氏不達其意遂誤以為常祭爾意者見前後經文唯有烝嘗禘三名以為祭名盡於此殊不知春秋所記祭祀唯記其失禮者於礿祠無失禮所以不記左氏不尋此意遂云烝嘗禘于廟撰禮篇者亦因之先儒遂説云諸侯三祭不知其本故也四時通用但以禮物多少為差品爾安得卑者即闕廢之乎明堂及王制並末流之儒述春秋之文不足據也説已具閔二年漢末諸儒尤迷其㫖不得本源互相乖背皆不可為凖三月乙巳及晉處父盟公羊曰何以不氏諱與大夫盟趙子曰按此乃是深責晉之無禮非為公諱也公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴左氏曰書士縠堪其事也啖子曰既命之卿例皆書名不論堪與不堪若言士縠是未命特書者則此㑹不聞有美何足異乎若不堪其事自當罪爾自十有二月不雨至于秋七月榖梁云歴時而言不雨文不憂雨也趙子曰夫子因舊史之書不雨告廟者則每時書之不告廟者則通言之志其不敬以示義爾義已見僖二年八月丁卯大事于太廟躋僖公左氏云宋祖帝乙鄭祖厲王啖子曰按宋當祖湯鄭是諸侯不敢祖天子故知此傳謬也文三年夏五月王子虎卒左氏曰弔如同盟禮也趙子曰按天子大夫無與諸侯盟之禮而曰禮也豈春秋之意乎榖梁云叔服也啖子曰叔服若是王子則㑹塟之時何不書王子乎秋雨螽于宋榖梁云著於上見於下謂之雨趙子曰假如有一物著於上見於下豈得云雨哉螽自空而下下又多有似於雨爾歴代有雨血雨毛雨土皆是也文四年夏逆婦姜于齊左氏云卿不行非禮也至于敬主之謂也趙子曰按公自逆常事不書以成禮於齊所以變文云逆婦以譏之傳不達此意遂妄為説假令以微者逆之即當但云夏逆女于齊不當稱婦也公羊云其謂之逆婦姜于齊何略之也高子曰娶于大夫者略之也啖子曰傳無事迹焉知娶于大夫書逆女有何妨乎故知稱婦者但譏禮成於彼爾榖梁曰稱婦有姑之辭也趙子曰此義自施於書至之例不施於書逆之時也榖梁又云其不言氏貶之也啖子曰凡夫人加氏字便於言爾今既曰婦姜故不要言氏無他義也文五年春王正月王使榮叔歸含且賵公榖皆云含且賵何兼之兼之非禮也趙子曰據言含且賵㨿禮含賵襚止一人公榖反云譏一人兼行二禮殊乖禮意也據禮含賵襚止一人兼行爾若毎事須一人則罄王朝之臣不足以充䘮禮之使也文六年季孫行父如陳左氏云且娶焉趙子曰若實如此則非禮經文當書之經既不書此説謬也閏月不告月猶朝于廟啖子曰公榖俱言不告月為是非也按經文上言不告月明當告也下云猶朝于廟言當止也又以告月為名明月朔皆當告也文七年三月甲戌取須句左氏云寘文公子焉非禮也趙子曰若實如此則經文當書以示譏經既不書何憑為實且書取皆譏也宋人殺其大夫左氏云不稱名衆也且言非其罪也趙子曰若以殺大夫衆而不書名則晉殺三卻鄭盗殺大夫何乃悉書乎故知妄也公羊云何以不名宋三世無大夫三世内娶啖子曰以三世内娶便云三世無大夫不近人理榖梁云稱人以殺誅有罪也趙子曰若實殺有罪何不書死者之名乎故知與常例不同戊子晉人及秦人戰于令狐左氏云晉人背先蔑而立靈公云云潛師夜起敗秦師于令狐啖子曰此傳説敗秦師並謬也按經書戰明二師相抗敵矣傳云潛師夜起與經乖矣又上言背先蔑立靈公明蔑在秦也次言先蔑將下軍則是在晉也何其自相背經言先蔑奔秦不言出明在外矣言背可也言將下軍非也葢先蔑時為下軍將而身在秦故致誤之也公㑹諸侯晉大夫盟于扈左氏曰公後至故不書其國避不敏也敏審也趙子曰按雖後至豈有不知其列㑹銓次乎殊失褒貶之意矣不書諸侯者意在責公不早赴而自取其耻爾公羊云失序也榖梁云略之也並鹵莽不足取文八年宋人殺其大夫司馬宋司城來奔左氏云司馬握節以死故書以官司城効節於府人而出公以其官逆之亦書以官皆貴之也啖子曰但謂能守官故以官書爾葢舊説言此二人不失節故致誤節謂節義非符節也如孔父義形於色而誤為女色也又按華孫來盟稱官亦謂能守官爾傳言其官皆從亦因舊説言其不失官遂致誤也公羊曰司馬者何司城者何皆以官舉也曷為皆以官舉宋三世無大夫三世内娶也按此見以官稱是有大夫曷云無乎榖梁云司馬官也其以官稱無君之辭司城官也其以官稱無君之辭也按有君稱官復何妨乎又曰來奔者不言出舉其接我也按其文曰來奔則出彼國之理昭矣聖人豈為其接魯遂不言出乎文九年春毛伯來求金公羊云何以不稱使三年然後稱王按前後例踰年即成君言三年非也三月夫人姜氏至自齊榖梁云卑以尊致病文公也趙子曰反而告廟是得禮也何謂病公乎冬楚子使椒來聘公羊云椒者何楚大夫也楚無大夫此何以書始有大夫也始有大夫則何以不氏許夷狄者不壹而足也按例凡未命之卿來魯皆書名無他義又文公已前不書楚大夫者好命未通爾有何許之乎榖梁云楚無大夫其曰椒何也以其來我褒之也趙子曰聖人設教豈以來我則褒之葢不知内外異辭之理故妄説也秦人來歸僖公成風之襚左氏云禮也諸侯相弔賀也雖不當事苟有禮焉書之以無忘舊好趙子曰春秋之作以為經國大訓故一字之義勸戒存焉若但以無忘舊好則書恐非聖人之意也公羊云其言僖公成風何兼之兼之非禮也曷為不言及成風成風尊也啖子曰僖公成風與惠公仲子何殊傳謂兩人誤也若實襚兩人史家豈將子居母上乎文十一年冬十月甲午叔孫得臣敗狄于鹹榖梁云一人而曰敗以衆焉言之也言其力足以敵衆趙子曰若如榖梁説則當云敗長狄于鹹今既直云狄則舉狄軍總敗爾且其帥見獲師自然敗何勞妄為義説若以不言帥師為義此例又甚多又云然則何為不言獲曰古者不重傷不禽二毛故不言獲為内諱也啖子曰不言獲賤夷狄之帥爾無他義也文十二年春王正月郕伯來奔左氏云郕太子朱儒自安於夫鍾邑名國人不狥順也郕伯卒郕人立君太子以夫鍾與郕邽來奔二邑名也公以諸侯逆之故書曰郕伯來奔釋所以稱郕伯不書地尊諸侯也尊諸侯故不可以竊邑之罪加之也趙子曰按諸侯嗣位未踰年猶稱子豈有君父病而不視死而不䘮身未即位以邑出奔而稱郕伯一何乖謬且鄭忽曹羈莒展皆已即位及其出奔猶但稱名况於都未嗣位乎且春秋正王綱之大節乃云為魯公以諸侯逆之之故即書曰郕伯乃春秋紊王綱也一何厚誣哉公羊曰失地之君也何以不名兄弟辭也趙子曰失地之君例書名若以兄弟之國不書曹衞何以書乎曹伯陽衞侯衎把伯來朝二月庚子子叔姬卒左氏曰杞桓公來朝始朝公也且請絶叔姬而無絶婚公許之不絶婚立其娣以為夫人二月叔姬卒不言把絶也書叔姬言非女也左氏經無子字啖子曰此傳大誤當在成八年誤置此爾義見成九年把伯來逆叔姬之䘮注公榖云稱子者公之母姊妹按經文稱子明是時君之子也乃云姊妹有何理哉秋秦伯使術來聘公羊曰遂者何公羊以術為遂秦大夫也秦無大夫此何以書賢繆公也何賢乎繆公以為能變也按例外大夫來魯未命者皆書名無他義也已前秦未嘗使大夫來故不書爾冬十有二月戊午晉人秦人戰于河曲榖梁云不言及秦晉之戰已亟故畧之亟數也言戰多不分其主客故不悉記也趙子曰據經定書日月又書地則是一戰爾何得云數哉葢不曉交為主之意妄為此説爾文十三年太室屋壞公羊云魯祭周公用白牲魯公用騂犅羣公不毛趙子曰魯宗廟牲色所尚當依周制不應有此數種之異此儒者妄説也文十四年秋晉人納㨗菑于邾弗克納左氏云趙盾以諸侯之師八百乗納㨗菑于邾趙子曰若實用諸侯師經不合不書故知妄也公羊云不克納者大其不克納也大謂美之趙子曰此乃譏其不量事而勞師爾聞義能止差可補過何足大之哉又云不與大夫專廢置君也實與而文不與趙子曰縱令諸侯豈得專廢置他國君乎何但大夫此乃譏辭又非實與而文不與也榖梁曰卻克稱人微之也趙子曰按例宣公已後侵伐多書卿名文公已前皆稱人不應此獨以人為貶九月齊公子商人弑其君舍左氏云子叔姬配齊昭公生舍云云按此傳以此經後齊人所執子叔姬為舍母又云單伯是周大夫故云爾啖子云春秋體例他國自囚國内之人舍母自是齊家人未有言執者則所執子叔姬為舍母非也又單伯明年書至自齊則是魯大夫益明矣若周大夫豈有於魯書至哉則左傳所説謬妄甚矣然則舍母葢魯之媵女别一叔姬爾左氏為附㑹後事故加子字此説無經文今故除之以袪疑惑公羊曰此未踰年之君也其言弑其君舍何已立之已殺之趙子曰假如非已立之得不為君乎文十五年春季孫行父如晉左氏云為單伯與子叔姬故也趙子曰按左氏本以子叔姬為齊公子舍之母以單伯為周大夫為被執故令季孫如晉請之事都謬也三月宋司馬華孫來盟榖梁云無君之辭啖子曰按宋見有君不得稱無也先儒曰雖有君若無也趙子曰春秋時無徳之君極多何得唯此一君獨無哉又云以君無徳故司馬憂懼自來魯求援趙子曰為臣之禮君雖無道豈容不禀其命專自行乎若信以此為美是以無君之道訓臣也夏曹伯來朝左氏曰諸侯五年再相朝古之制也趙子曰按周禮諸侯猶各以服數朝天子若五年諸侯再相朝即須四面而徃無停歇時矣以理推之諸侯除州伯之外當無相朝之限有事乃行齊人歸公孫敖之䘮趙子曰左氏云為孟氏且國故公羊云脅我而歸之並未得褒貶正理故不取六月單伯至自齊榖梁云大夫執則致致則名此其不名何天子之命大夫也啖子曰凡名單書則可分别字則不可分别故兼氏書之此傳但知天子大夫不合書名且不達兼書氏之義故略之晉卻缺帥師伐蔡戊申入蔡公羊云入不言伐此言伐何至之日也言兵至便入趙子曰若如此則當書云戊申卻缺帥師伐蔡入之據荘公二十八年云甲寅齊人伐衞衞人及齊戰以此知之此既隔伐而言入則非是便入也且伐與入皆足以罪晉何用重疊書之乎冬十有一月諸侯盟于扈趙子曰左氏説晉受齊賂而還無能為故也據二百四十二年中盟㑹豈盡能有成何獨貶此葢公當徃㑹而不及則不序諸侯所以為公諱之示諱也如彼自盟㑹公不合徃者則從告而序列之也左氏又云於是有齊難故公不㑹按此乃當徃㑹以救難何得不㑹乎又云凡諸侯㑹公不與即不書按諸侯與公不與而列㑹者非一則知左氏之説並非也十二月齊侯侵我西鄙遂伐曹入其郛公羊云入郛不書此何以書動我也動我者何内辭也其實我動焉爾啖子曰因其侵伐我遂入曹故得詳其事非為其動我也文十六年夏五月公四不視朔左氏公羊並云疾也趙子曰若誠有疾則夫子不當譏之春秋十二公除文之外餘未嘗書不視朔者豈皆無病足知病而不視朔常事不書也又據文公諸侯盟㑹三度不及又不視朔又不㑹齊以此推之知公性寛賒而怠於國務非疾也故從榖梁冬十有一月宋人殺其君杵臼左氏説被殺之由云夫人使公田孟諸而殺之公知之盡以寳行云云趙子曰傳例自云君無道也凡無道之人例皆强暴為人所畏祖母有何威權而能坐殺之乎若潛謀搆禍猶或可疑今乃云公知之載寳以行盡賜左右而端然待死推之人理未之有也故悉不取但依經例言其無道文十七年春晉人衞人陳人鄭人伐宋左氏云卿不書失其所也啖子曰按春秋不命之卿例書人非貶也傳見雜記言是晉荀林父之徒云云遂妄為此説若命卿失所即貶稱人不命者貶又如何書之夏諸侯㑹于扈左氏曰不與㑹齊難故也書曰諸侯無功也趙義同十五年盟于扈文十八年公子遂叔孫得臣如齊左氏云惠公立故且拜塟也傳釋使二人行意也趙子曰一卿将命可兼諸事豈有每事一卿乎予論此義已見九年歸含且賵傳必若禮合各行夫子必異其文以示義今連言故知必譏也冬十月子卒趙子曰據彭生命卿彭生惠伯名也而不書卒必當有義或曰安知不為内諱乎答曰春秋之諱皆微文見意不容都隠之也設令防世卿相黨之患不敢斥言則亦當變文示義如弑君不地之類不應都隱之也夫人姜氏歸于齊左氏曰出曰歸于某趙子曰按夫人公薨之後以子見殺自歸父母之家非被出也若有罪見黜則當云出歸于某不得但言歸也榖梁云姪娣者不孤子之意也一人有子三人緩帶言共望其禄也趙子曰若此説則嗣君非姪娣所生者則可以不事嫡母乎傷教違理甚矣莒弑其君庶其左氏云莒紀公生太子僕又生季佗愛季佗而黜僕且多行無禮於國僕因國人以弑紀公以其寳玉來奔啖子曰按春秋弑君例惡甚者不書賊臣之名懲暴君也可施乎君臣猶恐害教傷化但恐暴君無所忌憚不得已而立此義豈有父為不道子可致逆聖人訓典固當不然故不取又言季文子使太史克對公以文子比舜擬人非倫固不可取又言舜舉十六相亦不與尚書同故畧之春秋集傳辨疑卷七
