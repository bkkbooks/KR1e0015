body:
  text: 春秋集傳辨疑卷五唐陸淳撰閔元年春王正月公羊曰孰弑子般慶父也殺公子牙今將爾季子不免慶父弑君何以不誅將而不免遏惡也既而不可及因獄有所歸不探其情而誅焉親親之道也獄有所歸謂罪歸鄧扈樂也趙子曰按臣弑其君凡在官者殺無赦季子初至威令未著力不能爾非不討也季子來歸公榖皆云其言來歸喜之也趙子曰不言至異乎執爾春秋不為憂喜生文齊仲孫來公榖云是公子慶父䟽之故言齊仲孫啖子曰齊之仲孫謂是魯之公子謬亦甚矣閔二年吉禘于荘公公羊曰其言于荘公何未可以稱宫廟也曷為未可以稱宫廟在三年之中矣言在䘮不忍稱荘宫也趙子曰必若不合于宫廟行禘而今行之即當明書宫廟以示譏不應隱避也又云譏始不三年也若然則當有初字故知但譏此時未當吉爾非便為常也公薨榖梁曰其不書塟不以討母塟子也按不書塟者自為賊未討而塟爾不以討母塟子有何義乎公子慶父出奔莒榖梁曰其曰出絶之也按例大夫奔皆言出不可别為義齊高子來盟公羊曰何以不稱使我無君也注無所致命也趙子曰既與魯盟即是致命若不致命如何盟乎僖元年齊師宋師曹師次于聶北救邢公羊曰邢已亡矣葢狄滅之趙子曰按邢實未亡何得云亡又曰不言狄滅之為桓公諱也趙子曰若實諱前年狄入衞何得書乎葢不達狄兵未至邢自潰之理妄為此説又曰君則稱師何不與諸侯專封也趙子曰按齊宋曹三國君實不在但使師救爾何用曲為異説邢實未亡又何封乎又曰曷為不與實與而文不與趙子曰凡春秋得變之正皆變文以許之如衞人立晉天王狩于河陽之類乃是文與何得云不與又云上無天子下無方伯天下諸侯有相滅亡者力能救之則救之可也趙子曰此通論救義不獨指於桓公故移於例首發之榖梁以齊師為齊侯説同公羊邢遷于夷儀榖梁曰遷者猶得其國家以徃者也趙子曰遷者直移爾不煩妄釋又曰其地邢復見也趙子曰此自遷不同宋人遷宿之類自然須書地不煩釋也齊師宋師曹師城邢公榖皆云與前救邢一事也重書之以美齊侯之功按三國先救邢邢遷後廼城之各一事據實書爾何用曲為義乎夫人姜氏薨于夷齊人以歸公羊曰夷者何齊地也按下文云齊人以歸則齊地可知也榖梁曰夫人薨不地地故也言書地以明被殺趙子曰此説非也假如夫人歸寧在路遇疾而薨豈得不書地乎且君薨者皆記其寝被殺即不言地隱公是也桓公在齊被殺而亦書地故知在外薨不論有故無故皆當書地理甚昭然又曰不言以䘮歸非以䘮歸也加䘮焉諱以夫人歸也其以歸薨之也言生將夫人歸于夷殺之啖子曰但言薨則知䘮歸省文爾何用曲為義乎豈有以夫人歸而稱以䘮歸公子友帥師敗莒師于酈獲莒挐三傳皆云挐非卿以魯獲故書之按例凡不命之卿事接於魯及執殺奔放皆書莒慶鄭宛之類是也何乃於獲别生義乎榖梁又云季友搏殺莒挐啖子曰季友賢哲之士寧為匹夫之事乎傳誣也夫人氏之䘮至自齊公羊曰曷為不於弑為貶貶必於其重者莫重乎以䘮至也趙子曰文姜何不於死及塟貶之乎榖梁曰不言姜為齊桓諱殺同姓也趙子曰文姜不言姜亦是為齊諱乎僖二年城楚丘左氏曰諸侯城楚丘而封衞焉不書所㑹後也趙子曰據城緣陵言諸侯此不言諸侯魯自城爾若諸侯共城之如此為文魯自城之又何如分别乎且城小榖又是其證也公羊曰狄滅之不言滅為桓公諱也趙子曰按經文但言入無滅文又云桓公城衞而封之不言桓公城之不與諸侯專封也趙子曰按經文魯自為衞築城爾如何謂之齊桓封乎虞師晉師滅下陽左氏曰先書虞賄故也趙子曰按傳上文云虞請伐虢是明虞為兵主導引而先故先書爾縱受賄若不先師亦不先書也公羊曰先書虞使虞首惡也趙子曰滅夏陽之謀乃晉為始不應以虞為首惡也又云不繫夏陽於郭國之也曷為國之君存焉爾趙子曰予謂君存外邑聞兵至而歸國亦事之常何得稱滅若在下陽受兵則何得不見擒乎榖梁曰虞無師其曰師何也以其先晉不可以不言師也趙子曰經見云虞師何得謂無師乎又云夏陽者虞虢之塞邑也滅夏陽而虞虢舉矣趙子曰夫子原情定罪故得變例書滅爾豈有為其地勢險要而生文乎齊侯宋公江人黃人盟于貫公榖皆云江人黃人逺國之辭也逺國皆至諸侯皆來可知啖子曰春秋㑹盟之例皆據實書之亦無舉逺以包近之例冬十月不雨榖梁曰不雨者勤雨也趙子曰凡經時不雨告廟則書且不指事而言何以知其勤閔之意乎他公豈無經時不雨乎為不告廟爾僖三年夏四月不雨榖梁曰一時言不雨者閔雨也閔雨者有志乎民者也趙子曰猶未大雩安知其閔也又諸公豈無憂旱之心乎六月雨公羊云其言六月雨何上雨而不甚也按此釋迂僻之甚榖梁曰雨云者喜雨也喜雨者有志乎民者也趙子曰書六月雨者明旱不終夏不為災爾事理宜然無煩妄解齊侯宋公江人黃人㑹于陽榖左氏曰謀伐楚也趙子曰據明年伐楚江黃不與則知此説非也公羊曰此大㑹非也意同貫之盟啖子論已見上僖四年公㑹齊侯宋公陳侯衞侯鄭伯許男曹伯侵蔡蔡潰榖梁曰侵淺事也侵蔡而蔡潰以桓公為知所侵也趙子曰霸主當以討罪正邪為心豈以易侵而遂侵乎又凡春秋書侵伐皆罪之也不可妄加褒飾遂伐楚次于陘公羊云俟屈完也啖子曰初次之時安知屈完來乎趙子曰齊桓伐楚而討不貢則是尊王室也曷無異辭哉怒蔡興師飾情伐楚譏其非誠也故書曰遂或難曰若此師非誠心則論語云齊桓正而不譎何也答曰夫子葢别因事而論豈是指此事也哉但當據經例以釋春秋不得别引他據且齊桓首戴之㑹㑹王世子而不召王榖梁傳以為變之正斯豈為正歟許男新臣卒左氏榖梁皆云卒於師趙子曰許國與楚近葢許男遇疾而歸卒於國故不言卒於師爾若實卒於師而不言師則在師遇疾而歸國乃卒如何為文乎楚屈完來盟于師盟于召陵公羊曰師在召陵則曷為再言盟喜服楚也趙子曰若不重言盟于召陵則無以知退軍乃似盟于陘也若唯言來盟于召陵則莫知與誰盟又無以示退軍之禮據事不得不爾言喜服楚何其小哉公榖又云其言來何與桓為主内桓師也趙子曰其言來者自為魯侯在師爾若魯侯不在豈有言來之理乎齊人執陳轅濤塗公羊曰濤塗説桓公令師濵海而歸師陷沛澤之中顧而執濤塗啖子曰若然則是軍自失路致陷非濤塗之罪故左氏説是又云古者周公東征則西國怨西征則東國怨桓公假塗于陳而伐楚則陳人不欲其反由己者師不正故也趙子曰聖人立教豈使人盡為周公之行然後免罪乎榖梁云齊人者齊侯也其人之何不正其踰國而執也按執大夫例稱人何用别生義乎公至自伐楚公羊曰楚已服矣何以致伐楚畔盟也按楚雖已服何妨告廟云伐還豈可云公至自服楚乎僖五年杞伯姬來朝其子公羊曰其言來朝其子何内辭也按此文直書以示譏爾有何内辭乎公孫兹如牟左氏曰娶焉趙子曰大夫越境而娶非禮也經文不應無譏公及齊侯宋公陳侯衞侯鄭伯許男曹伯㑹王世子于首止榖梁云及以㑹尊之也按齊侯非㑹主故言及齊侯也晉人執虞公公羊曰虞已滅矣其言執之不與滅也滅者亡國之善辭趙子曰以不絶其祀故不書滅爾若云以滅為善辭則何者為不善乎榖梁曰執不言所於地緼於晉也按例執諸侯未有言其處者何用别為義又曰其稱公何也其下執之之辭晉命行乎虞民矣按以虞公曽為三公故謂之公無他義僖六年楚人圍許諸侯遂救許左氏曰蔡穆侯將許僖公以見楚子于武城許男面縛衘璧云云趙子曰楚本圍許以救鄭諸侯救許鄭以解圍楚師亦退許有何懼乃隨蔡侯為滅國之禮乎若爾許已從楚齊何故不稱師伐許乎又云微子啓如是亦可疑僖八年鄭伯乞盟公榖皆云乞盟者處其所而請與也葢汋之也啖子曰乞者卑重之辭爾言汋與之迂僻甚矣假如乞師又如何汋之禘于太廟用致夫人左氏曰致哀姜焉按元年哀姜稱夫人以薨明用夫人䘮禮已久矣何乃八年始致之乎公羊曰譏以妾為妻也葢脅于齊媵女之先至者趙子曰按若娶于齊則不當媵先至若娶於他國而公親徃未還則無人受脅而立齊媵榖梁義以為立成風趙子曰按僖公若致其母即當言夫人風氏不當但云夫人但云夫人者時君之妻爾且聲姜更無書至處故知因其至特設禘禮以為榮觀故變文譏之耳冬十二月天王崩趙子曰左氏云七年閏月惠王崩襄王惡大叔之亂不發䘮而告難于齊八年正月㑹于洮謀王室也襄王位定而後發䘮據此則正月二月已位定何得直至八年十二月而後告䘮于諸侯則左氏此説皆不足憑也僖九年宋公禦説卒左氏曰凡在䘮王曰小童公侯曰子啖子曰按王猛在䘮不曰小童故知非也又伯子男在䘮亦當稱子獨言公侯亦誤也公羊曰何以不書塟為襄公諱也按不書塟者魯不㑹爾為襄公諱有何義乎夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘九月戊辰諸侯盟于葵丘公羊曰貫澤之㑹桓公有憂中國之心不召而至者江人黃人也葵丘之㑹桓公震而矜之叛者九國趙子曰按此㑹唯有六國至十三年㑹于鹹有七國十五年盟于牡丘亦七國並舊盟之國寧有九國叛乎榖梁曰葵丘之㑹陳牲而不殺讀書加于牲上趙子曰按經無異文安知不㰱乎傳次以日月為例故穿鑿爾傳曰桓盟不日此其日者美其陳牲也晉里克殺其君之子奚齊公羊云稱其君之子未踰年君之號啖子曰齊舍亦未踰年君也何不云其君之子故知榖梁云國人不子之義是也僖十年晉殺其大夫里克公羊云曷為不言惠公之入晉之不言出入者踊為文公諱也踊猶渾也齊人語辭按此傳不知有不告則不書之義故穿鑿僖十四年諸侯城緣陵十三年㑹于鹹諸侯也左氏曰不書其人有闕也按此傳不知有前目後凡之義故妄為此説公羊曰曷為城杞滅也孰滅之葢徐莒脅之按把自懼楚而遷何關徐莒事乎又明年楚自伐徐益知其謬也榖梁曰其曰諸侯散辭也桓徳衰矣按此稱諸侯即上㑹於鹹之國爾不列序者前目後凡之例爾季姬及鄫子遇于防使鄫子來朝左氏曰季姬鄫子之夫人公怒鄫子不朝季姬使之朝啖子曰按稱季姬明魯未嫁女也若是鄫夫人不當言與鄫子遇又明年歸于鄫明此時鄫子請娶之公榖説是也若言魯之處女不當與諸侯㑹則文姜哀姜淫泆至甚文姜與殺桓公哀姜與殺閔公文姜弑公猶頻與齊㑹則淫風久行積漸成俗季姬少見文姜之行遂致於此又何怪乎公羊曰鄫子曷為使乎季姬之來内辭也按此直書以見其惡有何内辭乎沙鹿崩公羊曰何以書為天下記異也趙子曰凡山崩不繫國者以其自有常處不比隕星退鶂也公羊不達此理遂妄釋爾榖梁曰林屬於山為鹿謂山足也沙山名也無崩道而崩鹿在平地不合崩故志之趙子曰沙鹿山名杜元凱云在元城縣是也若是山足當云陷何得言崩又云無崩道而崩故志之然則山有崩道梁山崩何志之榖梁葢見梁山云山此不言山又帶鹿字所以疑爾詳經意梁山若不言山但云梁崩則不知是何梁沙鹿是山名不足疑故不言山從省文也僖十五年己卯晦震夷伯之廟公榖並云晦㝠也趙子曰晦者晦朔之晦爾據十六年戊申朔隕石于宋五成十六年甲午晦晉楚戰于鄢陵並書晦朔則知古史之體應合書日而遇晦朔必書之以為歴數之證榖梁成十六年甲午晦傳云事遇晦書晦何得於此獨名晦㝠乎或曰彼為陳不違晦故書以示譏答曰春秋舉大訓但譏其戰爭此非兵法不緣其不解兵而譏之也公羊又云夷伯季氏之孚微者稱夷伯大之也天戒之故大之大謂字而不名予按褒貶當以義類豈有為天所罰翻乃稱字反於理甚矣但以大夫既死加謚之後不更稱名爾原仲亦是也則公榖之説並非也楚人敗徐于婁林榖梁曰夷狄相敗志也按有赴告則書無他義晉侯及秦伯戰于韓獲晉侯公羊曰何以不言師敗績君獲不言師敗績也按左氏晉侯以戎馬還濘而止師實不敗也榖梁曰韓之戰晉侯失民矣以其民未敗而君獲也按此傳都不見事理但對華元故妄為此説爾僖十六年正月戊申朔隕石于宋五是月六鷁退飛過宋都公羊曰是月何以不日晦日也何以不言晦春秋不書晦啖子曰凡異例不書日隕石書日者特記元正有變爾六鶂則是同月也若更不言是月則似同日然此傳不達其意遂妄為此説且前後書晦多矣曷言不書晦乎榖梁曰是月者决不日而月也按此傳不達前意又以日月為例故云爾又曰民所聚曰都都者直謂國城爾不獨以民聚為義公子季友卒榖梁曰大夫不言公子公孫疎之也按若依此説有未命為大夫不命大夫者則如何書之乎春秋集傳辨疑巻五
