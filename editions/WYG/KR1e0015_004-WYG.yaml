body:
  text: 春秋集傳辨疑卷四唐陸淳撰莊十七年齊人執鄭詹左氏曰鄭不朝也趙子曰若以國事見執據例當稱行人公榖皆云詹鄭之微者書甚佞也言微者不當書特為佞書也趙子曰諸見執者豈無罪乎何獨特書此佞葢不知不命大夫被執亦當書之故造此義爾榖梁又云為下文起本趙子曰若執猶不書奔何足書乎亦無理若為來魯則書但言自齊逃來足知見執何假先書之齊人殱于遂榖梁曰此謂狎敵也趙子曰此説乃譏其不善用兵爾恐非教迹荘十八年公追戎于濟西左氏曰不言其來諱之也啖子曰據書曰追明不覺其來已去而追爾直言事實有何諱乎公羊曰未有言伐者其言追何為中國追也榖梁云不言戎伐我不使戎邇於我按言追明已去而逐之不言侵伐不覺其來爾無他義公榖又云言濟西者大之也按書濟西譏逺追爾言大亦無義荘十九年冬齊人宋人陳人伐我西鄙榖梁曰其曰鄙逺之也其逺之何不以難邇我國也趙子曰春秋例内以異外豈為私情生文此太煩碎荘二十年齊大災公羊曰大災者何大瘠也啖子曰災天火也大之者其災大也若以大災為大瘠新宫災亦是新宫瘠乎荘二十二年肆大眚公羊曰始忌眚也啖子曰肆者放也眚者過也如今之赦爾忌眚有何義乎榖梁曰為嫌天子不許之塟趙子曰按當時天子微弱魯肯畏之乎若實有畏王之心則自赦以除母罪豈為得禮且魯荘未嘗有怨齊之心塟母肯有所忌赦自赦爾塟自塟爾事不相關荘二十三年祭叔來聘榖梁云不正其外交故不與使也按不言使者原其來意非天子之命爾非謂責其外交則去使字也公至自齊公羊曰桓㑹不致信之也此之桓國何以致危之也按凡公行反告廟則書桓㑹不致有何義乎穿鑿甚矣且按㑹桓公而反書至又多矣荆人來聘公榖皆云稱人進之也啖子曰若言荆來聘則似舉州皆來故加人字以成文義爾無他義公及齊侯遇于榖蕭叔朝公公羊云其言朝公何公在外也按為其行朝禮遂言朝爾非為在外榖梁云朝於廟於外非正也趙子曰若於國中而不於廟乃為非禮若於境外如何求廟乎且諸侯朝於四岳之下亦豈得求廟乎荘二十四年公如齊逆女公羊曰親迎禮也按合禮則常事不書故知榖梁譏逆於齊是也夫人姜氏入公羊曰其言入何難也啖子曰以義不當入故言入爾有何難乎曹羈出奔陳公羊曰曹羈者曹大夫也按曹羈者義同鄭忽爾云是大夫非也赤歸于曹郭公公榖皆云赤者葢郭公也趙子曰赤者曹公子也郭公自是闕文其文義都不相關傳誤甚矣荘二十五年陳侯使女叔來聘左氏曰嘉之故不名啖子曰聘者常事有何可嘉故知榖梁云天子之命大夫是也日有食之鼓用牲于社公羊曰求乎隂之道也趙子曰凡在此例皆失禮乃書若言求隂之道乃是得禮與例相反矣又云以朱􅁝營社趙子曰據禮書無此文故不取此榖梁曰鼓禮也用牲非禮也按左氏例是故不取此伯姬歸于杞榖梁曰不言逆逆之道微無足道焉爾不言逆者夫自逆常事故不書也秋大水鼓用牲于社于門公羊曰于社禮也按左氏例近是故不取此説荘二十六年曹殺其大夫公羊曰何以不名衆也趙子曰曹小國也唯有二卿何足為衆又曰曷為衆殺之不死于曹君者也趙子曰假如不死節豈有舉國盡殺之乎榖梁曰不稱名姓無命大夫也趙子曰按例不命大夫被殺皆書名荘二十七年公㑹齊侯宋公陳侯鄭伯同盟于幽榖梁曰於是授之諸侯趙子曰按十六年已霸何待此時又云衣裳之㑹十有一兵車之㑹四趙子曰按經文不殊何以分别並無理凡征伐則兵車修好則衣裳大例皆然何獨桓公公子友如陳塟原仲公羊曰大夫不書塟此何以書通季子之私行也啖子曰大夫適他國㑹大夫塟惡也書之適足以加惡何名通其私行乎榖梁曰言塟不言卒不塟者也不塟而曰塟諱出奔也按春秋前後無有虚設其事以為義者且書塟之意直譏季友之行爾彼是陳國大夫安得書其卒乎荘二十八年齊人伐衞衞人及齊人戰衞人敗績公羊曰春秋伐者為客伐者為主注云伐人者為客見伐者為主趙氏曰夫文字本以記分别今同其文誰能了之又曰曷為使衞主之衞未有罪爾按例皆以被伐為主又何解乎又曰敗者稱師衞何以不稱師未得乎師也按經文成列而戰矣何名未得師乎榖梁曰戰則是師也其曰人何微之趙子曰衞稱人者罪其逆王拒大國以取敗特異其文爾微之有何義乎冬築微大無麥禾公羊曰冬既見無麥禾矣曷為先言築微而後言無麥禾諱以凶年造邑也啖子曰築微冬之初也無麥禾歲終諸榖皆入而無此二榖乃書依先後記事爾何闗諱乎榖梁曰冬築微山林藪澤之利所以與民共也虞之非正也啖子曰此當施於築囿之下不宜濫在此又曰大無麥禾者有顧之辭也按大者言其甚也如大災大水之類稱有顧如何為義也臧孫辰告糴于齊左氏曰禮也趙子曰據諱是譏諱謂不言公使非善之也榖梁曰諸侯無粟諸侯相歸粟正也臧孫辰告糴于齊告然後與之言内之無外交也趙子曰此若不告彼何由知之荘二十九年春新延廐左氏曰新作延廐趙子曰若新作但當云作延廐不當云新也又傳云書不時也凡馬日中而出日中而入日中春秋分也啖子曰此説亦非馬雖出入有時廐何妨農隙修之秋有蜚左氏曰為災也啖子曰此非為災之物蜚盧尾切臭蟲也一名負蠜又曰凡物不為災不書啖子曰春秋記異多矣何必為災乃書城諸及防榖梁曰以大及小也啖子曰此但依先後次第破甚者先之或近邊者亦先之何必小大乎荘三十年師次于成榖梁曰次止也有畏也欲救鄣而不能也不言公耻不能救鄣也趙子曰據齊霸已成魯為之弱何敢議救葢欲㑹齊圍鄣至成待命聞鄣已降故不行爾然疑事毋質但當存而勿解爾齊人降鄣公羊曰鄣者何紀之遺邑也啖子曰紀之全國猶不敢敵齊豈有一邑之民而能二十餘年獨拒齊乎故鄣自是小國爾塟紀叔姬公羊曰隱其亡國而塟之趙氏説同塟伯姬齊人伐山戎公榖皆云此齊侯也貶而稱人按例無有諸侯自伐改為人者趙子曰二傳不知謬文之義妄穿鑿耳啖子曰葢齊侯謬文耳説見明年荘三十有一年齊侯來獻戎㨗趙子曰據齊未霸之時尚不曾朝魯今既為霸主豈有自獻戎㨗乎必無此理但文誤爾二傳皆言齊侯親伐山戎春秋唯有去年齊人伐山戎又僖九年葵丘之㑹宰孔曰齊侯不務徳而勤逺畧故北伐山戎南伐楚西為此㑹皆論齊侯親行之事表裏相證足知是齊侯自行也僖十年雖有齊侯許男伐北戎不稱山戎即非山戎也且在宰孔言伐山戎之後則不關山戎之事不足為疑則知去年伐山戎當書齊侯今獻㨗當書齊人交互致誤爾榖梁曰獻戎㨗軍得曰㨗戎菽也趙子曰齊桓分戎菽與諸侯不近人情又㨗者軍得耳安知是菽乎春築臺于郎夏築臺于薛秋築臺于秦公羊三傳各有説一云譏臨民之所漱浣一云譏逺也一云譏臨國啖子曰一歲三築臺假如皆得其所豈無妨於人乎何用三譏其處也榖梁曰虞山林藪澤之利啖子曰築臺不應虞山林藪澤之利此傳當施於築囿下又曰倚齊桓公外無諸侯之變故築臺此説無益於為教荘三十有二年宋公齊侯遇于梁丘左氏曰齊為楚伐鄭之故請㑹于諸侯趙子曰按荆伐鄭經今五年豈有許時方報之乎又曰宋公請先見于齊若以先見則位在上也假令鄭先見亦得在上耶榖梁解梁丘去國之逺按梁丘即所遇之地耳又何解乎公子牙卒公羊曰何以不稱弟殺也按書公子常例也叔肹書弟自特書爾不得引以為義公子慶父如齊榖梁曰此奔也其曰如諱之也啖子曰若實奔而書曰如乃是掩其惡豈其然乎春秋集傳辨疑卷四
